<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
  <!-- Calendar body -->
  <rect x="3" y="5" width="18" height="16" rx="2"/>
  <!-- Top edge / header stripe -->
  <rect x="3" y="5" width="18" height="4.5" rx="2"/>
  <!-- Body area (lighter) -->
  <rect x="3" y="8.5" width="18" height="12.5" rx="0 0 2 2" fill="white" opacity="0.15"/>
  <!-- Binding pin left -->
  <rect x="7.5" y="3" width="1.8" height="4" rx="0.9"/>
  <!-- Binding pin right -->
  <rect x="14.7" y="3" width="1.8" height="4" rx="0.9"/>
  <!-- Date grid dots -->
  <circle cx="8" cy="13" r="1.1" fill="white" opacity="0.4"/>
  <circle cx="12" cy="13" r="1.1" fill="white" opacity="0.4"/>
  <circle cx="16" cy="13" r="1.1" fill="white" opacity="0.4"/>
  <!-- Selected date - center prominent -->
  <circle cx="12" cy="17" r="1.6" fill="white"/>
  <!-- Faint row lines -->
  <line x1="5.5" y1="15" x2="18.5" y2="15" stroke="white" stroke-width="0.3" opacity="0.25"/>
</svg>
