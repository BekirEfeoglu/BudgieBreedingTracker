<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
  <!-- Three horizontal bars of different lengths, stacked vertically -->
  <!-- Bar 1 (longest) -->
  <rect x="3" y="5" width="16" height="3.2" rx="1.6" stroke="currentColor" stroke-width="0.7"/>
  <!-- Bar 2 (medium, selected — with circle indicator) -->
  <rect x="3" y="10.4" width="12" height="3.2" rx="1.6" stroke="currentColor" stroke-width="0.7"/>
  <!-- Selected indicator circle on bar 2 -->
  <circle cx="13" cy="12" r="1.2" fill="white"/>
  <!-- Bar 3 (shortest) -->
  <rect x="3" y="15.8" width="8" height="3.2" rx="1.6" stroke="currentColor" stroke-width="0.7"/>
  <!-- Subtle inner lines for bar texture -->
  <line x1="5" y1="6.6" x2="10" y2="6.6" stroke="white" stroke-width="0.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="5" y1="17.4" x2="7" y2="17.4" stroke="white" stroke-width="0.5" stroke-linecap="round" opacity="0.3"/>
</svg>
