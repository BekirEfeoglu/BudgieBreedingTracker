<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
  <!-- Nest outer bowl shape -->
  <path d="M3 13c0 5 4 8 9 8s9-3 9-8c0-.5-.1-.8-.2-1H3.2c-.1.2-.2.5-.2 1z" opacity="0.15"/>
  <path d="M2.5 12.5c-.3 0-.5.2-.5.5 0 5.2 4.3 9 10 9s10-3.8 10-9c0-.3-.2-.5-.5-.5z" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Nest rim (thicker top edge) -->
  <path d="M2.5 12.5c0-.8.5-1.5 1.5-2 1.5-.7 4.5-1.2 8-1.2s6.5.5 8 1.2c1 .5 1.5 1.2 1.5 2" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Nest cross-weave texture lines -->
  <path d="M4.5 14c2.5 1.2 5.5 1.8 7.5 1.8s5-.6 7.5-1.8" stroke="currentColor" stroke-width="0.4" stroke-linecap="round" fill="none"/>
  <path d="M5.5 16.5c2 1 4.5 1.5 6.5 1.5s4.5-.5 6.5-1.5" stroke="currentColor" stroke-width="0.4" stroke-linecap="round" fill="none"/>
  <path d="M7 18.5c1.5.7 3.2 1 5 1s3.5-.3 5-1" stroke="currentColor" stroke-width="0.4" stroke-linecap="round" fill="none"/>
  <!-- Vertical weave hints -->
  <path d="M8 12c-.5 2-.3 4.5.5 6.5" stroke="currentColor" stroke-width="0.4" stroke-linecap="round" fill="none"/>
  <path d="M12 11.3v8.2" stroke="currentColor" stroke-width="0.4" stroke-linecap="round" fill="none"/>
  <path d="M16 12c.5 2 .3 4.5-.5 6.5" stroke="currentColor" stroke-width="0.4" stroke-linecap="round" fill="none"/>

  <!-- Eggs inside the nest -->
  <ellipse cx="9.5" cy="12.8" rx="1.5" ry="1.9" transform="rotate(-10 9.5 12.8)" opacity="0.85"/>
  <ellipse cx="12.2" cy="12.5" rx="1.4" ry="1.85" transform="rotate(5 12.2 12.5)" opacity="0.85"/>
  <ellipse cx="14.8" cy="13" rx="1.3" ry="1.8" transform="rotate(12 14.8 13)" opacity="0.85"/>

  <!-- Egg highlights -->
  <ellipse cx="9.2" cy="11.8" rx="0.4" ry="0.6" fill="white" opacity="0.5" transform="rotate(-10 9.2 11.8)"/>
  <ellipse cx="11.9" cy="11.5" rx="0.4" ry="0.6" fill="white" opacity="0.5" transform="rotate(5 11.9 11.5)"/>
  <ellipse cx="14.5" cy="12" rx="0.35" ry="0.55" fill="white" opacity="0.5" transform="rotate(12 14.5 12)"/>

  <!-- Small straw/twig accents on top -->
  <path d="M5 11.5c1-.8 2.2-1 3-.5" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" fill="none"/>
  <path d="M16 11c1.2-.5 2.5-.3 3.2.5" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" fill="none"/>
</svg>
