<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
  <!-- Nest bowl shape (simplified) -->
  <path d="M2 14c0 4.5 4.5 7.5 10 7.5S22 18.5 22 14c0-.3-.1-.6-.2-.8H2.2c-.1.2-.2.5-.2.8z" opacity="0.15"/>
  <path d="M2 13.5c0 4.8 4.5 8 10 8s10-3.2 10-8" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Nest rim -->
  <path d="M2 13.5c0-.7.5-1.3 1.5-1.8 1.5-.6 4.8-1 8.5-1s7 .4 8.5 1c1 .5 1.5 1.1 1.5 1.8" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Nest cross-weave texture -->
  <path d="M4 15.5c2.5 1 5.5 1.5 8 1.5s5.5-.5 8-1.5" stroke="currentColor" stroke-width="0.4" stroke-linecap="round" fill="none"/>
  <path d="M5.5 17.5c2 .8 4.2 1.2 6.5 1.2s4.5-.4 6.5-1.2" stroke="currentColor" stroke-width="0.4" stroke-linecap="round" fill="none"/>
  <!-- Vertical weave hints -->
  <path d="M9 12.5c-.3 1.5-.2 3.5.3 5" stroke="currentColor" stroke-width="0.4" stroke-linecap="round" fill="none"/>
  <path d="M15 12.5c.3 1.5.2 3.5-.3 5" stroke="currentColor" stroke-width="0.4" stroke-linecap="round" fill="none"/>

  <!-- Chick peeking out from nest -->
  <!-- Chick body (small, inside nest) -->
  <ellipse cx="12" cy="12.5" rx="2.5" ry="2"/>
  <!-- Chick head -->
  <circle cx="12" cy="9.5" r="2.3"/>
  <!-- Chick beak (small) -->
  <path d="M13.9 10l.8.1c.12 0 .15.12.08.2l-.35.4c-.05.08-.12.1-.2.05l-.4-.3c-.08-.08-.05-.25.07-.45z"/>
  <!-- Chick eye -->
  <circle cx="12.8" cy="9.2" r="0.8"/>
  <circle cx="13.05" cy="8.95" r="0.25" fill="white"/>

  <!-- Chick fluffy head tuft -->
  <path d="M11 7.5c.2-.5.5-.8.8-1" stroke="currentColor" stroke-width="0.6" stroke-linecap="round" fill="none"/>
  <path d="M12.2 7.2c.1-.4.3-.7.5-.9" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" fill="none"/>

  <!-- Small wing on chick -->
  <path d="M10.2 11.5c.8.2 1.5.1 2-.3" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" fill="none"/>

  <!-- Checkmark in upper-right corner -->
  <circle cx="19.5" cy="4.5" r="3.2" opacity="0.15"/>
  <circle cx="19.5" cy="4.5" r="3" fill="none" stroke="currentColor" stroke-width="0.8"/>
  <path d="M17.8 4.5l1.2 1.2 2.3-2.5" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
