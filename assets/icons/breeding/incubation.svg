<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
  <!-- Egg (lower portion, visible below bird) -->
  <ellipse cx="12" cy="17.5" rx="4.5" ry="5" opacity="0.2"/>
  <ellipse cx="12" cy="17.5" rx="4.5" ry="5" fill="none" stroke="currentColor" stroke-width="0.8"/>
  <!-- Egg highlight -->
  <ellipse cx="10.5" cy="15.5" rx="0.8" ry="1.2" fill="white" opacity="0.4" transform="rotate(-8 10.5 15.5)"/>

  <!-- Bird body sitting on egg -->
  <path d="M6.5 11c0-3 2.5-5.5 5.5-5.5s5.5 2.5 5.5 5.5c0 1.5-.5 2.8-1.3 3.8-.5.5-1.2 1-2 1.2-1.5.5-3 .5-4.4 0-.8-.2-1.5-.7-2-1.2C7 13.8 6.5 12.5 6.5 11z"/>

  <!-- Bird head (round budgie head on top) -->
  <circle cx="12" cy="7" r="3.2"/>

  <!-- Bird beak -->
  <path d="M14.8 7.5l1.2.2c.2.1.2.3.1.4l-.8.6c-.1.1-.3.1-.4 0l-.4-.8c-.1-.2 0-.4.3-.4z"/>

  <!-- Bird eye -->
  <circle cx="13.2" cy="6.5" r="0.9"/>
  <circle cx="13.5" cy="6.2" r="0.28" fill="white"/>

  <!-- Head stripe pattern (budgie markings) -->
  <path d="M10 5.5c.8-.3 1.6-.4 2.2-.3" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" fill="none"/>
  <path d="M9.5 6.3c1-.3 2-.4 2.8-.2" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" fill="none"/>

  <!-- Wing accent lines -->
  <path d="M8 10c1.8.8 3.5.5 5-.5" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" fill="none"/>
  <path d="M8.3 11.2c1.5.6 3 .3 4.2-.5" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" fill="none"/>
  <path d="M8.8 12.2c1.2.4 2.5.2 3.5-.4" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" fill="none"/>

  <!-- Warmth lines rising above bird -->
  <path d="M10 3.5c-.3-.8-.1-1.5.3-2" stroke="currentColor" stroke-width="0.6" stroke-linecap="round" fill="none"/>
  <path d="M13.5 3c.2-.7.5-1.2.8-1.5" stroke="currentColor" stroke-width="0.6" stroke-linecap="round" fill="none"/>

  <!-- Tail feathers -->
  <path d="M7 13c-1.2 1.5-1.8 3-1.5 4 .1.2.3.2.3 0l1.5-2.8c.1-.2 0-.3-.1-.3z"/>
</svg>
