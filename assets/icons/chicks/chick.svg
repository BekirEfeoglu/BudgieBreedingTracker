<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
  <!-- Fluffy baby budgie chick facing slightly right -->
  <!-- Body - round plump shape -->
  <ellipse cx="12.3" cy="14.5" rx="5" ry="4.8"/>
  <!-- Body depth -->
  <ellipse cx="12.3" cy="15.2" rx="3.8" ry="2.5" opacity="0.1"/>
  <!-- Head - oversized round (~40% of body) -->
  <circle cx="12.8" cy="7.2" r="4.2"/>
  <!-- Neck connection -->
  <ellipse cx="12.5" cy="10.5" rx="3.2" ry="2.2"/>
  <!-- Left eye -->
  <circle cx="11.2" cy="6.5" r="1"/>
  <circle cx="11.5" cy="6.2" r="0.28" fill="white"/>
  <!-- Right eye -->
  <circle cx="14.6" cy="6.5" r="1"/>
  <circle cx="14.9" cy="6.2" r="0.28" fill="white"/>
  <!-- Tiny triangle beak -->
  <path d="M15.8 7.8l1.6 0.5-1.4 0.8z"/>
  <!-- Fluffy head feathers (tuft) -->
  <path d="M11.5 3.2c0.3-0.5 0.8-0.8 1.2-0.7 0.2 0.3 0 0.9-0.3 1.2"/>
  <path d="M13 3c0.4-0.4 0.9-0.5 1.2-0.3 0.1 0.3-0.2 0.8-0.6 1.1"/>
  <!-- Small wing shape on body -->
  <path d="M8.2 12.5c-0.8 0.6-1.2 1.8-0.8 3 0.3 0.8 1 1.5 1.8 1.8 0.5-1.2 0.3-2.8-0.2-3.8z" opacity="0.15"/>
  <!-- Left foot -->
  <line x1="10.5" y1="18.8" x2="9.5" y2="21" stroke="currentColor" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="9.5" y1="21" x2="8.5" y2="21.5" stroke="currentColor" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="9.5" y1="21" x2="10.2" y2="21.7" stroke="currentColor" stroke-width="0.6" stroke-linecap="round"/>
  <!-- Right foot -->
  <line x1="13.8" y1="18.8" x2="14.5" y2="21" stroke="currentColor" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="14.5" y1="21" x2="13.6" y2="21.5" stroke="currentColor" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="14.5" y1="21" x2="15.4" y2="21.6" stroke="currentColor" stroke-width="0.6" stroke-linecap="round"/>
</svg>
