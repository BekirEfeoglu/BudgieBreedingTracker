<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
  <!-- Promote: small chick (left) -> curved arrow -> adult bird (right) -->
  <!-- Small chick on the left -->
  <circle cx="4.5" cy="14.5" r="2"/>
  <circle cx="4.8" cy="12.2" r="1.6"/>
  <ellipse cx="4.6" cy="13.2" rx="1.2" ry="0.9"/>
  <!-- Chick eye -->
  <circle cx="4.4" cy="11.8" r="0.45"/>
  <circle cx="4.55" cy="11.65" r="0.14" fill="white"/>
  <!-- Chick tiny beak -->
  <path d="M5.8 12.4l0.7 0.2-0.5 0.4z"/>
  <!-- Chick fluffy tuft -->
  <path d="M4 10.8c0.2-0.4 0.5-0.5 0.7-0.4 0.05 0.2-0.1 0.5-0.35 0.7"/>
  <!-- Chick feet -->
  <line x1="3.8" y1="16.2" x2="3.4" y2="17.5" stroke="currentColor" stroke-width="0.5" stroke-linecap="round"/>
  <line x1="5.2" y1="16.2" x2="5.5" y2="17.5" stroke="currentColor" stroke-width="0.5" stroke-linecap="round"/>
  <!-- Body depth -->
  <ellipse cx="4.5" cy="15" rx="1.4" ry="0.9" opacity="0.1"/>
  <!-- Curved arrow in the center -->
  <path d="M8 13.5 Q12 7, 16 11" stroke="currentColor" stroke-width="1" stroke-linecap="round" fill="none"/>
  <!-- Arrowhead -->
  <path d="M15 9.5l1.5 1.5-2 0.3z"/>
  <!-- Adult bird on the right -->
  <ellipse cx="19.5" cy="13.5" rx="3.2" ry="2.8"/>
  <circle cx="20.2" cy="10.2" r="2.2"/>
  <ellipse cx="19.8" cy="11.6" rx="1.9" ry="1.3"/>
  <!-- Adult eye -->
  <circle cx="19.8" cy="9.7" r="0.6"/>
  <circle cx="20" cy="9.52" r="0.18" fill="white"/>
  <!-- Adult beak -->
  <path d="M21.6 10.3l1.2 0.3-0.9 0.6z"/>
  <!-- Adult wing detail -->
  <path d="M17 12.5c-0.6 0.5-0.9 1.4-0.6 2.2 0.4-0.1 0.8-0.9 0.8-1.7z" opacity="0.2"/>
  <!-- Adult tail feathers -->
  <path d="M16.6 14.5c-0.7 0.6-0.9 1.4-0.5 1.8 0.4-0.1 0.9-0.7 1-1.4z" opacity="0.2"/>
  <!-- Adult body depth -->
  <ellipse cx="19.5" cy="14.2" rx="2.4" ry="1.5" opacity="0.1"/>
  <!-- Adult feet -->
  <line x1="18.3" y1="16" x2="17.8" y2="17.8" stroke="currentColor" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="17.8" y1="17.8" x2="17" y2="18.2" stroke="currentColor" stroke-width="0.5" stroke-linecap="round"/>
  <line x1="17.8" y1="17.8" x2="18.5" y2="18.3" stroke="currentColor" stroke-width="0.5" stroke-linecap="round"/>
  <line x1="20.5" y1="16" x2="21" y2="17.8" stroke="currentColor" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="21" y1="17.8" x2="20.3" y2="18.2" stroke="currentColor" stroke-width="0.5" stroke-linecap="round"/>
  <line x1="21" y1="17.8" x2="21.8" y2="18.3" stroke="currentColor" stroke-width="0.5" stroke-linecap="round"/>
</svg>
