<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
  <!-- Growth: three ascending bird silhouettes (small chick -> medium juvenile -> large adult) -->
  <!-- Ascending line connecting them -->
  <path d="M3 20.5 Q8 17, 12 13 Q16 9, 21 4" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" fill="none" opacity="0.2"/>
  <!-- Small chick (left) -->
  <circle cx="4.2" cy="17.2" r="1.8"/>
  <circle cx="4.5" cy="15.2" r="1.4"/>
  <circle cx="4.1" cy="14.8" r="0.4"/>
  <circle cx="4.25" cy="14.65" r="0.12" fill="white"/>
  <path d="M5.2 15.3l0.6 0.15-0.5 0.3z"/>
  <line x1="3.5" y1="18.8" x2="3.2" y2="19.8" stroke="currentColor" stroke-width="0.5" stroke-linecap="round"/>
  <line x1="4.8" y1="18.8" x2="5.1" y2="19.8" stroke="currentColor" stroke-width="0.5" stroke-linecap="round"/>
  <!-- Medium juvenile (center) -->
  <ellipse cx="11.5" cy="12.5" rx="2.5" ry="2.3"/>
  <circle cx="12" cy="9.8" r="1.8"/>
  <ellipse cx="11.7" cy="11" rx="1.6" ry="1"/>
  <circle cx="11.5" cy="9.4" r="0.5"/>
  <circle cx="11.7" cy="9.25" r="0.15" fill="white"/>
  <path d="M13 9.8l0.8 0.2-0.6 0.45z"/>
  <!-- Tail feather hint -->
  <path d="M9.2 13.2c-0.6 0.3-1 0.8-0.8 1.2 0.3 0.1 0.8-0.2 1-0.6z" opacity="0.3"/>
  <line x1="10.5" y1="14.5" x2="10.2" y2="16" stroke="currentColor" stroke-width="0.5" stroke-linecap="round"/>
  <line x1="12.3" y1="14.5" x2="12.6" y2="16" stroke="currentColor" stroke-width="0.5" stroke-linecap="round"/>
  <!-- Large adult bird (right) -->
  <ellipse cx="19.5" cy="7.5" rx="3" ry="2.6"/>
  <circle cx="20.2" cy="4.5" r="2.1"/>
  <ellipse cx="19.8" cy="5.8" rx="1.8" ry="1.2"/>
  <circle cx="19.7" cy="4" r="0.6"/>
  <circle cx="19.9" cy="3.82" r="0.18" fill="white"/>
  <path d="M21.5 4.5l1 0.25-0.8 0.5z"/>
  <!-- Wing detail -->
  <path d="M17.2 6.8c-0.5 0.4-0.8 1.2-0.5 2 0.3-0.2 0.6-1 0.7-1.6z" opacity="0.2"/>
  <!-- Tail feathers -->
  <path d="M16.8 8.5c-0.8 0.5-1.2 1.2-1 1.8 0.4 0 1-0.5 1.3-1.2z" opacity="0.25"/>
  <line x1="18.5" y1="9.8" x2="18.2" y2="11.5" stroke="currentColor" stroke-width="0.5" stroke-linecap="round"/>
  <line x1="20.3" y1="9.8" x2="20.6" y2="11.5" stroke="currentColor" stroke-width="0.5" stroke-linecap="round"/>
  <!-- Subtle upward arrow hint -->
  <path d="M20 2.5l1-1 1 1" stroke="currentColor" stroke-width="0.6" stroke-linecap="round" fill="none" opacity="0.35"/>
</svg>
