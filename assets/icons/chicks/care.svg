  <path d="M3 11c-0.3 1.5 0 3.5 0.8 5 1 1.8 2.5 3.2 4.5 4 2 0.8 4.2 1 6.2 0.6 2-0.5 3.8-1.6 5-3.2 1-1.4 1.5-3 1.5-4.5 0-1-0.3-1.8-0.8-2.2-0.5-0.4-1.2-0.4-1.8-0.1-0.5 0.3-1 0.8-1.4 1.4l-0.3 0.5c-0.3-0.8-0.8-1.5-1.5-1.8-0.6-0.3-1.3-0.2-1.8 0.2"/>
  <!-- Hand/wing palm curve -->
  <path d="M3 11c0.3-0.8 0.8-1.5 1.5-2 0.8-0.5 1.6-0.6 2.4-0.3 0.8 0.3 1.4 1 1.8 1.8 0.3 0.6 0.5 1.3 0.5 2" opacity="0.15"/>
  <!-- Thumb/wing tip -->
