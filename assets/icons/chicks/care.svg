  <path d="M18.5 10.6c0.5-1 1.2-1.5 1.8-1.2 0.4 0.3 0.5 1 0.2 1.7" opacity="0.3"/>
  <!-- Small chick nestled inside the hand -->
  <!-- Chick body -->
  <ellipse cx="11.5" cy="14.8" rx="2.5" ry="2.3"/>
  <!-- Chick body depth -->
  <ellipse cx="11.5" cy="15.4" rx="1.8" ry="1.2" opacity="0.1"/>
  <!-- Chick head -->
  <circle cx="12" cy="11.8" r="2"/>
  <!-- Neck -->
  <ellipse cx="11.7" cy="13" rx="1.5" ry="1"/>
  <!-- Chick left eye -->
  <circle cx="11.2" cy="11.3" r="0.5"/>
  <circle cx="11.35" cy="11.15" r="0.15" fill="white"/>
  <!-- Chick right eye -->
  <circle cx="13" cy="11.3" r="0.5"/>
  <circle cx="13.15" cy="11.15" r="0.15" fill="white"/>
  <!-- Chick tiny beak -->
  <path d="M13.5 12l0.7 0.2-0.5 0.35z"/>
  <!-- Chick fluffy head tuft -->
  <path d="M11.2 10c0.2-0.4 0.5-0.5 0.7-0.3 0 0.2-0.1 0.5-0.3 0.6"/>
  <path d="M12.2 9.8c0.3-0.3 0.6-0.4 0.8-0.2 0 0.2-0.2 0.5-0.4 0.6"/>
