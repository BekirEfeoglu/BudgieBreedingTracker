  <line x1="10.5" y1="16.8" x2="10" y2="18" stroke="currentColor" stroke-width="0.5" stroke-linecap="round"/>
  <line x1="12.3" y1="16.8" x2="12.7" y2="18" stroke="currentColor" stroke-width="0.5" stroke-linecap="round"/>
</svg>
