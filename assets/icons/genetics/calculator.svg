<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
  <!-- Calculator body -->
  <rect x="4" y="1.5" width="16" height="21" rx="2.5" ry="2.5" stroke="currentColor" stroke-width="1" fill="none"/>
  <!-- Display area background -->
  <rect x="6" y="3.5" width="12" height="5.5" rx="1.2" ry="1.2" opacity="0.1"/>
  <!-- Display border -->
  <rect x="6" y="3.5" width="12" height="5.5" rx="1.2" ry="1.2" stroke="currentColor" stroke-width="0.5" fill="none" opacity="0.4"/>
  <!-- Mini DNA helix in display -->
  <path d="M9.5 4.5 C9.5 4.5, 12.5 5.2, 12.5 6 C12.5 6.8, 9.5 7.2, 9.5 8" stroke="currentColor" stroke-width="0.7" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M14.5 4.5 C14.5 4.5, 11.5 5.2, 11.5 6 C11.5 6.8, 14.5 7.2, 14.5 8" stroke="currentColor" stroke-width="0.7" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- Mini base pairs in display -->
  <line x1="10.5" y1="5.2" x2="13.5" y2="5.2" stroke="currentColor" stroke-width="0.4" stroke-linecap="round" opacity="0.25"/>
  <line x1="11" y1="6.8" x2="13" y2="6.8" stroke="currentColor" stroke-width="0.4" stroke-linecap="round" opacity="0.25"/>
  <!-- Button grid row 1 -->
  <rect x="6.5" y="11" width="2.5" height="2" rx="0.5" ry="0.5" opacity="0.6"/>
  <rect x="10.75" y="11" width="2.5" height="2" rx="0.5" ry="0.5" opacity="0.6"/>
  <rect x="15" y="11" width="2.5" height="2" rx="0.5" ry="0.5" opacity="0.6"/>
  <!-- Button grid row 2 -->
  <rect x="6.5" y="14.5" width="2.5" height="2" rx="0.5" ry="0.5" opacity="0.45"/>
  <rect x="10.75" y="14.5" width="2.5" height="2" rx="0.5" ry="0.5" opacity="0.45"/>
  <rect x="15" y="14.5" width="2.5" height="2" rx="0.5" ry="0.5" opacity="0.45"/>
  <!-- Button grid row 3 -->
  <rect x="6.5" y="18" width="2.5" height="2" rx="0.5" ry="0.5" opacity="0.3"/>
  <rect x="10.75" y="18" width="2.5" height="2" rx="0.5" ry="0.5" opacity="0.3"/>
  <rect x="15" y="18" width="2.5" height="2" rx="0.5" ry="0.5" opacity="0.3"/>
</svg>
