<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
  <!-- Single DNA strand running vertically -->
  <path d="M12 2 L12 4.5 C12 5, 14 5.5, 14 6.5 C14 7.5, 10 8, 10 9 C10 10, 14 10.5, 14 11.5 C14 12.5, 10 13, 10 14 C10 15, 14 15.5, 14 16.5 C14 17.5, 12 18, 12 18.5 L12 22" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" fill="none"/>
  <!-- Mutation highlight circle -->
  <circle cx="12" cy="11.5" r="3.5" opacity="0.15"/>
  <!-- Mutation accent ring -->
  <circle cx="12" cy="11.5" r="3.5" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" fill="none" opacity="0.3"/>
  <!-- Nucleotide bumps on normal segments -->
  <circle cx="13" cy="4" r="0.6" opacity="0.4"/>
  <circle cx="11" cy="6" r="0.6" opacity="0.4"/>
  <circle cx="13" cy="8" r="0.6" opacity="0.4"/>
  <circle cx="11" cy="15" r="0.6" opacity="0.4"/>
  <circle cx="13" cy="17" r="0.6" opacity="0.4"/>
  <circle cx="12" cy="19.5" r="0.6" opacity="0.4"/>
  <!-- Mutated nucleotide — larger, emphasized -->
  <circle cx="12" cy="11.5" r="1.1"/>
  <!-- Sparkle accent near mutation -->
  <g transform="translate(16.5, 8.5)">
    <line x1="0" y1="-1.5" x2="0" y2="1.5" stroke="currentColor" stroke-width="0.6" stroke-linecap="round"/>
    <line x1="-1.5" y1="0" x2="1.5" y2="0" stroke="currentColor" stroke-width="0.6" stroke-linecap="round"/>
    <line x1="-1" y1="-1" x2="1" y2="1" stroke="currentColor" stroke-width="0.4" stroke-linecap="round" opacity="0.5"/>
    <line x1="1" y1="-1" x2="-1" y2="1" stroke="currentColor" stroke-width="0.4" stroke-linecap="round" opacity="0.5"/>
  </g>
  <!-- Small sparkle -->
  <g transform="translate(7.5, 14)">
    <line x1="0" y1="-0.8" x2="0" y2="0.8" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="-0.8" y1="0" x2="0.8" y2="0" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" opacity="0.5"/>
  </g>
  <!-- Terminal dots -->
  <circle cx="12" cy="2" r="0.8"/>
  <circle cx="12" cy="22" r="0.8"/>
</svg>
