<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
  <!-- Top-left: larger rounded rect -->
  <rect x="2.5" y="2.5" width="9" height="9.5" rx="2" stroke="currentColor" stroke-width="0.7" stroke-linecap="round"/>
  <!-- Top-right: shorter rect -->
  <rect x="13.5" y="2.5" width="8" height="5.5" rx="2" stroke="currentColor" stroke-width="0.7" stroke-linecap="round"/>
  <!-- Bottom-left: shorter rect -->
  <rect x="2.5" y="14" width="8" height="5.5" rx="2" stroke="currentColor" stroke-width="0.7" stroke-linecap="round"/>
  <!-- Bottom-right: taller rect -->
  <rect x="12.5" y="10" width="9" height="9.5" rx="2" stroke="currentColor" stroke-width="0.7" stroke-linecap="round"/>
  <!-- Data indicator: small bars in top-left cell -->
  <rect x="4.5" y="8" width="1.5" height="2.5" rx="0.5" fill="white"/>
  <rect x="7" y="6.5" width="1.5" height="4" rx="0.5" fill="white"/>
  <rect x="9.5" y="7.5" width="1.5" height="3" rx="0.5" fill="white"/>
  <!-- Data dot in bottom-right cell -->
  <circle cx="17" cy="14" r="1" fill="white"/>
  <circle cx="19.5" cy="15.5" r="0.7" fill="white"/>
  <circle cx="15" cy="16" r="0.7" fill="white"/>
</svg>
