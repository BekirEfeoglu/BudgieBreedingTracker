<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
  <!-- Clipboard body -->
  <rect x="4" y="3.5" width="16" height="18.5" rx="2" stroke="currentColor" stroke-width="0.7" stroke-linecap="round"/>
  <!-- Clipboard clip/holder at top -->
  <rect x="8" y="1.5" width="8" height="3.5" rx="1.2" fill="white" stroke="currentColor" stroke-width="0.7" stroke-linecap="round"/>
  <rect x="10" y="2.5" width="4" height="1.5" rx="0.5" fill="currentColor"/>
  <!-- Inner area (cutout for content) -->
  <rect x="6" y="7" width="12" height="13" rx="0.8" fill="white"/>
  <!-- Checkmark line 1 -->
  <polyline points="7.5,10.5 9,12 11,9.5" fill="none" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="12.5" y1="10.5" x2="16.5" y2="10.5" stroke="currentColor" stroke-width="0.7" stroke-linecap="round"/>
  <!-- Checkmark line 2 -->
  <polyline points="7.5,15 9,16.5 11,14" fill="none" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="12.5" y1="15.5" x2="16.5" y2="15.5" stroke="currentColor" stroke-width="0.7" stroke-linecap="round"/>
</svg>
