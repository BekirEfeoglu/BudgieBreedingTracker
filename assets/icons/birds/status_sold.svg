<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
  <!-- Bird silhouette facing right -->
  <path d="M10.5 4.5c-1.3 0-2.4 0.7-2.4 1.9 0 0.6 0.3 1.1 0.7 1.5C7.2 8.5 6 10 6 12c0 2.5 1.8 4.2 4.5 4.2 1 0 1.8-0.2 2.5-0.6"/>
  <!-- Main body shape -->
  <path d="M11 3.5c-1.3 0-2.5 0.8-2.5 2 0 0.6 0.3 1.2 0.7 1.6C7.5 7.8 6 9.5 6 11.8c0 2.8 2 4.7 5 4.7 2.2 0 3.8-1 4.5-2.5 0.3-0.6 0.4-1.3 0.3-2-0.2-1.3-1-2.5-2.2-3.2 0.4-0.4 0.6-1 0.6-1.6 0-1.4-1.2-2.2-2.5-2.2z"/>
  <!-- Eye -->
  <circle cx="12.5" cy="5.2" r="0.8"/>
  <circle cx="12.7" cy="5" r="0.25" fill="white"/>
  <!-- Beak -->
  <path d="M14 5.5c0.5 0 0.9 0.15 1 0.4 0.05 0.15-0.05 0.3-0.2 0.3L14 6z"/>
  <!-- Wing line -->
  <line x1="7.5" y1="10.5" x2="11.5" y2="9.5" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" fill="none"/>
  <!-- Tail -->
  <path d="M7 13.5c-1 0.8-1.5 2-1.8 3.2-0.05 0.2 0.08 0.3 0.2 0.2 0.7-0.6 1.3-1.5 1.8-2.5z" opacity="0.6"/>
  <!-- Legs -->
  <line x1="9.5" y1="16" x2="9.2" y2="18" stroke="currentColor" stroke-width="0.6" stroke-linecap="round" fill="none"/>
  <line x1="11.5" y1="16" x2="11.8" y2="18" stroke="currentColor" stroke-width="0.6" stroke-linecap="round" fill="none"/>
  <!-- Price tag hanging from neck area -->
  <line x1="13.5" y1="7.5" x2="17" y2="10" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" fill="none"/>
  <!-- Tag shape -->
  <path d="M16 9.5l3.5-0.5 0.8 3.5-3.5 0.5z" opacity="0.9"/>
  <path d="M16.2 9.7l3.1-0.45 0.7 3.1-3.1 0.45z" opacity="0.08"/>
  <!-- Tag hole -->
  <circle cx="17" cy="10.5" r="0.5" fill="none" stroke="currentColor" stroke-width="0.4"/>
  <!-- Price symbol on tag -->
  <path d="M18.2 11.2c0.3-0.1 0.6 0 0.7 0.2s-0.1 0.4-0.3 0.4c-0.3 0-0.5-0.1-0.5-0.3" fill="none" stroke="currentColor" stroke-width="0.4" stroke-linecap="round"/>
  <!-- Tag string knot -->
  <circle cx="13.8" cy="7.8" r="0.3" opacity="0.5"/>
</svg>
