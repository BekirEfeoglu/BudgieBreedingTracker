<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
  <!-- round head -->
  <circle cx="10" cy="6.5" r="3.2"/>
  <!-- eye -->
  <circle cx="11.2" cy="5.8" r=".9" fill="currentColor"/>
  <!-- cere bump (budgie signature) -->
  <ellipse cx="12.8" cy="6" rx=".8" ry=".5" fill="currentColor" opacity=".35"/>
  <!-- small curved beak -->
  <path d="M13.2 6.6c.7-.1 1.2.2 1.2.7s-.5.8-1 .7" stroke-width="1.6" fill="currentColor" opacity=".12"/>
  <!-- body -->
  <path d="M8.2 9.5c-2.2 1-3.5 2.8-3.5 5.2 0 2.4 1.6 3.8 4 3.8h3.2"/>
  <path d="M12.2 9.2c1.8.9 2.8 2.4 2.8 4.3.1 1.8-.5 3.2-1.8 3.8"/>
  <!-- wavy wing bars (budgie signature - 3 distinct bars) -->
  <path d="M7.8 11.2c1.8-.1 3.5.4 4.8 1.3" stroke-width="1.3" opacity=".5"/>
  <path d="M7.5 12.8c1.6 0 3.2.4 4.4 1.1" stroke-width="1.2" opacity=".4"/>
  <path d="M7.3 14.3c1.4 0 2.8.3 3.8.9" stroke-width="1.1" opacity=".3"/>
  <!-- long stepped tail (budgie signature) -->
  <path d="M12.2 17.8l4 4" stroke-width="1.8"/>
  <path d="M11.5 18l3.2 3.8" stroke-width="1.4" opacity=".55"/>
  <!-- feet -->
  <path d="M8 18.2l-1.2 2.8M9.5 18.3l-.4 2.7" stroke-width="1.3"/>
</svg>
