<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>Yuvada muhabbet kuşu ve yumurtalar, kuluçka temalı animasyon</title>
  <desc>Animasyonlu, modern 2D vektörel muhabbet kuşu ve yuvası.</desc>
  
  <style>
    /* Reset and basics */
    * {
      transform-box: fill-box;
      transform-origin: center;
    }
    
    /* Variables */
    :root {
      --green: #7EDC7A;
      --yellow: #F7E27E;
      --stroke: #2B2B2B;
      --beak: #F2A25C;
      --nest: #8B5E3C;
      --nest-light: #A5734D;
      --egg: #F6F3EA;
      --egg-shadow: #E8E2D5;
      --eye: #1A1A1A;
    }

    /* Keyframes */
    @keyframes breathe {
      0%, 100% { transform: scaleY(1) translateY(0); }
      50% { transform: scaleY(1.01) translateY(3px); }
    }
    
    @keyframes blink {
      0%, 96%, 100% { transform: scaleY(1); }
      98% { transform: scaleY(0.1); }
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.85; }
      50% { transform: scale(1.01); opacity: 1; }
    }
    
    @keyframes radiate {
      0% { transform: scale(0.85); opacity: 0.35; }
      100% { transform: scale(1.25); opacity: 0; }
    }
    
    @keyframes feather-sway {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(2deg); }
    }
    
    @keyframes head-shy {
      from { transform: rotate(0deg) translateY(0); }
      to { transform: rotate(-6deg) translateY(1px); }
    }
    
    @keyframes egg-hop {
      0% { transform: translateY(0); }
      40% { transform: translateY(-12px); }
      70% { transform: translateY(3px); }
      100% { transform: translateY(0); }
    }

    /* Applications */
    #bird {
      animation: breathe 3.2s ease-in-out infinite;
    }
    
    #eye {
      animation: blink 6s infinite;
    }
    
    #egg-2 {
      animation: pulse 1.8s ease-in-out infinite;
    }
    
    #heat-ring {
      animation: radiate 2.8s ease-out infinite;
    }
    
    #feathers {
      transform-origin: top center;
      animation: feather-sway 2.4s ease-in-out infinite;
    }

    /* State Classes for Interaction (can be toggled via JS/CSS elsewhere) */
    .state-password #head {
      animation: head-shy 0.4s ease-out forwards;
    }
    
    .state-submit #egg-1,
    .state-submit #egg-2,
    .state-submit #egg-3 {
      animation: egg-hop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1;
    }
    
    .state-submit #egg-1 { animation-delay: 0s; }
    .state-submit #egg-2 { animation-delay: 0.1s; }
    .state-submit #egg-3 { animation-delay: 0.2s; }
    
  </style>

  <g id="scene">
    <!-- Heat/Incubation Ring -->
    <ellipse id="heat-ring" cx="256" cy="380" rx="140" ry="40" fill="none" stroke="#F2A25C" stroke-width="3" stroke-dasharray="8 8" opacity="0" />

    <!-- NEST -->
    <g id="nest" transform="translate(106, 310)">
      <!-- Back edge of nest -->
      <path d="M 40 40 Q 150 0 260 40 Q 150 70 40 40 Z" fill="var(--nest)" />
      
      <!-- Eggs go here (inside/behind front edge) -->
      <!-- Left Egg -->
      <g id="egg-1" transform="translate(70, 0)">
        <ellipse cx="0" cy="0" rx="20" ry="26" fill="var(--egg)" stroke="var(--stroke)" stroke-width="2.5" transform="rotate(-15)" />
        <ellipse cx="-4" cy="2" rx="14" ry="20" fill="var(--egg-shadow)" opacity="0.5" transform="rotate(-15)" />
      </g>
      
      <!-- Center (Active) Egg -->
      <g id="egg-2" transform="translate(130, -5)">
        <ellipse cx="0" cy="0" rx="22" ry="28" fill="var(--egg)" stroke="var(--stroke)" stroke-width="2.5" />
        <ellipse cx="-4" cy="2" rx="16" ry="22" fill="var(--egg-shadow)" opacity="0.6" />
      </g>
      
      <!-- Right Egg -->
      <g id="egg-3" transform="translate(190, 5)">
        <ellipse cx="0" cy="0" rx="18" ry="24" fill="var(--egg)" stroke="var(--stroke)" stroke-width="2.5" transform="rotate(20)" />
        <ellipse cx="-3" cy="2" rx="12" ry="18" fill="var(--egg-shadow)" opacity="0.4" transform="rotate(20)" />
      </g>

      <!-- Front edge of nest -->
      <path d="M 0 30 Q 150 120 300 30 Q 280 140 150 140 Q 20 140 0 30 Z" fill="var(--nest-light)" stroke="var(--stroke)" stroke-width="3" stroke-linejoin="round" />
      <!-- Nest details (twigs) -->
      <path d="M 40 60 Q 100 90 150 80 M 80 100 Q 160 120 220 90 M 180 60 Q 240 70 270 40 M 120 50 Q 180 40 200 60" fill="none" stroke="var(--stroke)" stroke-width="2.5" stroke-linecap="round" />
    </g>

    <!-- BIRD -->
    <!-- 3/4 right-facing profile, seated in nest -->
    <g id="bird" transform="translate(130, 70)">
      
      <!-- Tail -->
      <g id="tail" transform="translate(-40, 180)">
        <path d="M 50 0 L -10 90 L 10 100 Z" fill="var(--green)" stroke="var(--stroke)" stroke-width="3" stroke-linejoin="round" />
        <path d="M 50 0 L 10 110 L 25 115 Z" fill="var(--yellow)" stroke="var(--stroke)" stroke-width="3" stroke-linejoin="round" />
      </g>

      <!-- Left Wing (Back wing) -->
      <g id="wing-left" transform="translate(50, 110)">
        <path d="M 0 0 Q 30 10 20 60 Q 10 40 -10 10 M -10 10 Z" fill="var(--green)" stroke="var(--stroke)" stroke-width="3" stroke-linejoin="round" />
      </g>

      <!-- Body -->
      <g id="body" transform="translate(0, 80)">
        <path d="M 40 0 C 130 0 160 90 120 160 C 80 200 0 200 -20 150 C -50 80 -10 0 40 0 Z" fill="var(--green)" stroke="var(--stroke)" stroke-width="3" />
        
        <!-- Belly highlight/color separation -->
        <path d="M -10 40 C 30 40 60 90 40 160 C 10 180 -10 160 -20 140 C -40 90 -40 50 -10 40 Z" fill="var(--yellow)" opacity="0.4" />
      </g>

      <!-- Head -->
      <g id="head" transform="translate(30, 20)">
        <!-- Head Base -->
        <path d="M 40 0 C 90 0 110 50 90 90 C 70 120 10 110 -10 80 C -30 50 -10 0 40 0 Z" fill="var(--yellow)" stroke="var(--stroke)" stroke-width="3" />
        
        <!-- Cere & Beak -->
        <g id="beak" transform="translate(90, 50)">
          <!-- Cere -->
          <ellipse cx="0" cy="-5" rx="8" ry="10" fill="#88C0D0" stroke="var(--stroke)" stroke-width="2.5" />
          <!-- Beak top -->
          <path d="M -5 2 Q 15 -5 12 15 Q 5 10 -5 2 Z" fill="var(--beak)" stroke="var(--stroke)" stroke-width="2.5" stroke-linejoin="round" />
          <!-- Beak bottom -->
          <path d="M -2 10 Q 5 18 2 22 Q -5 18 -2 10 Z" fill="var(--beak)" stroke="var(--stroke)" stroke-width="2" stroke-linejoin="round" />
        </g>

        <!-- Eye -->
        <g id="eye" transform="translate(60, 35)">
          <circle cx="0" cy="0" r="8" fill="var(--eye)" />
          <!-- Highlight -->
          <circle cx="2" cy="-2" r="2.5" fill="#FFFFFF" />
        </g>

        <!-- Cheek Patch/Spots -->
        <circle cx="40" cy="80" r="6" fill="#5E81AC" />
        <circle cx="20" cy="75" r="4" fill="#2B2B2B" />
        <circle cx="5" cy="65" r="4" fill="#2B2B2B" />
        
        <!-- Head Barring/Stripes (Feathers pattern) -->
        <g id="feathers" stroke="var(--stroke)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6">
          <path d="M -10 20 Q 10 10 30 15" />
          <path d="M -12 30 Q 10 20 25 25" />
          <path d="M -15 40 Q 5 30 15 35" />
          <path d="M -10 50 Q 8 45 10 50" />
        </g>
      </g>

      <!-- Right Wing (Front wing) -->
      <g id="wing-right" transform="translate(20, 100)">
        <path d="M 10 0 C 80 10 100 80 60 140 C 30 120 0 60 10 0 Z" fill="var(--green)" stroke="var(--stroke)" stroke-width="3" stroke-linejoin="round" />
        
        <!-- Wing Barring Details -->
        <g stroke="var(--stroke)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7">
          <path d="M 20 30 Q 50 35 60 50" />
          <path d="M 15 50 Q 50 55 65 80" />
          <path d="M 20 80 Q 40 85 55 110" />
          <path d="M 30 100 Q 40 110 45 125" />
        </g>
      </g>
      
    </g>
  </g>
</svg>
