<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
  <!-- Peaceful bird lying on its side -->
  <path d="M4 14.5c0.5-1 1.5-1.5 2.8-1.5l8.5 0.5c1.5 0.1 2.5 0.8 2.8 1.8 0.2 0.6 0 1.2-0.3 1.7-0.5 0.7-1.5 1.2-2.8 1.3l-7.5 0c-1.8-0.1-3.2-0.8-3.5-2.2-0.1-0.5 0-1.1 0-1.6z"/>
  <!-- Bird head (lying down) -->
  <path d="M4.5 13.5c-0.8-0.3-1.3-1-1.3-1.8 0-1 0.8-1.8 1.8-1.8 0.8 0 1.5 0.4 1.8 1l0.2 0.5c-0.5 0.5-1.2 1.2-1.8 1.6z"/>
  <!-- Closed eye (peaceful) -->
  <path d="M4.5 11.5c0.4 0.15 0.8 0.15 1.2 0" fill="none" stroke="currentColor" stroke-width="0.5" stroke-linecap="round"/>
  <!-- Small beak -->
  <path d="M3 12c-0.4-0.1-0.7 0.05-0.8 0.25-0.05 0.12 0.02 0.25 0.15 0.25L3 12.3z"/>
  <!-- Wing folded -->
  <line x1="7" y1="14" x2="12" y2="13.5" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" fill="none"/>
  <line x1="7.5" y1="15" x2="12.5" y2="14.5" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" fill="none"/>
  <!-- Tail trailing -->
  <path d="M17.5 15c1 0 1.8 0.3 2.2 0.8 0.05 0.1-0.02 0.2-0.12 0.18-0.7-0.1-1.4 0-2 0.2z" opacity="0.6"/>
  <!-- Legs tucked -->
  <path d="M10 17c-0.2 0.5-0.1 1 0.1 1.3" fill="none" stroke="currentColor" stroke-width="0.5" stroke-linecap="round"/>
  <path d="M12 17c0.2 0.5 0.1 1-0.1 1.3" fill="none" stroke="currentColor" stroke-width="0.5" stroke-linecap="round"/>
  <!-- Small flower above (gentle, respectful) -->
  <circle cx="9" cy="7.5" r="0.7" opacity="0.5"/>
  <circle cx="10.2" cy="7" r="0.7" opacity="0.5"/>
  <circle cx="9.6" cy="8.3" r="0.7" opacity="0.5"/>
  <circle cx="8.4" cy="7" r="0.7" opacity="0.5"/>
  <circle cx="8.8" cy="8.3" r="0.7" opacity="0.5"/>
  <circle cx="9.3" cy="7.7" r="0.45" opacity="0.7"/>
  <!-- Stem -->
  <path d="M9.3 9c0 0.8 0.3 1.5 0.5 2.2" fill="none" stroke="currentColor" stroke-width="0.4" stroke-linecap="round" opacity="0.5"/>
  <!-- Small leaf -->
  <path d="M9.8 10c0.5 0.2 0.8 0 0.8-0.3" fill="none" stroke="currentColor" stroke-width="0.3" stroke-linecap="round" opacity="0.4"/>
  <!-- Subtle ground line -->
  <ellipse cx="11" cy="17.5" rx="6" ry="0.3" opacity="0.08"/>
</svg>
