<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
  <!-- Bird leg - organic curved shape (zoomed in view) -->
  <path d="M13 2c0.3 0 0.6 0.15 0.7 0.4l0.3 0.6c0.15 0.3 0.1 0.6-0.1 0.8L13 4.8v3.7"/>
  <!-- Upper leg -->
  <line x1="13" y1="2" x2="13" y2="8.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <!-- Ring/band around leg - rounded rectangle -->
  <rect x="10.5" y="8" width="5" height="3.5" rx="1" ry="1" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <rect x="10.8" y="8.3" width="4.4" height="2.9" rx="0.8" ry="0.8" opacity="0.12"/>
  <!-- Ring detail lines (engraved text suggestion) -->
  <line x1="11.5" y1="9.5" x2="14.5" y2="9.5" stroke="currentColor" stroke-width="0.4" stroke-linecap="round" fill="none"/>
  <line x1="12" y1="10.3" x2="14" y2="10.3" stroke="currentColor" stroke-width="0.3" stroke-linecap="round" fill="none"/>
  <!-- Lower leg continuing -->
  <line x1="13" y1="11.5" x2="13" y2="17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <!-- Foot/toes - organic curved -->
  <path d="M13 17c0 0-2.5 1.5-3.5 2.5" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <path d="M13 17c0 0-1 2-1 3" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <path d="M13 17c0 0 1 2 1 3" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <path d="M13 17c0 0 2.5 1.5 3.5 2.5" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <!-- Toe nails -->
  <circle cx="9.3" cy="19.7" r="0.35"/>
  <circle cx="11.8" cy="20.2" r="0.35"/>
  <circle cx="14.2" cy="20.2" r="0.35"/>
  <circle cx="16.7" cy="19.7" r="0.35"/>
  <!-- Feather hint at top -->
  <path d="M11.5 2.5c0.5-0.5 1.2-0.8 1.5-0.5 0.3 0.3-0.2 0.8-0.5 1" opacity="0.2"/>
  <path d="M14.5 2.5c-0.5-0.5-1.2-0.8-1.5-0.5-0.3 0.3 0.2 0.8 0.5 1" opacity="0.2"/>
</svg>
