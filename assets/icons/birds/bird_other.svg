<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
  <!-- generic round head -->
  <circle cx="10" cy="7" r="2.8"/>
  <!-- eye -->
  <circle cx="10.8" cy="6.3" r=".75" fill="currentColor"/>
  <!-- simple medium beak -->
  <path d="M12.5 6.6l2.2-.3-1.8 1.3" stroke-width="1.5"/>
  <!-- simple body -->
  <path d="M8.2 9.5c-2.2.8-3.5 2.6-3.5 4.8 0 2.3 1.6 3.7 3.8 3.7h3.8c1.8 0 3.2-.9 3.5-2.6.3-1.6-.4-3.2-2-4.2"/>
  <!-- simple wing -->
  <path d="M8.8 11.5c1.5 0 2.8.3 4 1.1" stroke-width="1.1" opacity=".4"/>
  <path d="M8.5 13.2c1.3 0 2.5.3 3.5.9" stroke-width="1" opacity=".3"/>
  <!-- medium tail -->
  <path d="M14.2 16.5l2.8 2.5" stroke-width="1.6"/>
  <path d="M13.8 17.2l2 2.3" stroke-width="1.2" opacity=".5"/>
  <!-- question mark (distinguishes "other/unknown") -->
  <path d="M18.5 2.5c.8-.3 1.6 0 1.8.7.2.7-.2 1.4-.9 1.7l-.7.4c-.3.2-.4.5-.4.8" stroke-width="1.6" opacity=".55"/>
  <circle cx="18.3" cy="7" r=".5" fill="currentColor" opacity=".55"/>
  <!-- feet -->
  <path d="M7.5 17.5l-1 2.5M9.2 17.8l-.3 2.2" stroke-width="1.3"/>
</svg>
