  <path d="M7.5 14.5c-1.3 0.8-2.3 2.2-2.8 3.8-0.08 0.2 0.05 0.35 0.2 0.25 1-0.6 2-1.5 2.8-2.8z" opacity="0.55"/>
  <path d="M7 14c-1.5 0.5-2.8 1.5-3.5 3-0.1 0.2 0 0.35 0.18 0.25 1.1-0.4 2.2-1.2 3-2.2z" opacity="0.4"/>
