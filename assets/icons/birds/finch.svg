<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
  <!-- Finch - compact round body, short thick conical beak, short tail -->
  <!-- Main round body + head -->
  <path d="M12 4c-1.5 0-2.8 0.8-2.8 2.2 0 0.6 0.3 1.2 0.7 1.6C8 8.5 6.5 10.2 6.5 12.5c0 3 2.3 5.2 5.8 5.2s5.8-2.2 5.8-5.2c0-2.3-1.5-4-3.4-4.7 0.4-0.4 0.7-1 0.7-1.6C15.4 4.8 14 4 12.5 4z"/>
  <!-- Eye -->
  <circle cx="14" cy="5.8" r="0.95"/>
  <circle cx="14.3" cy="5.5" r="0.3" fill="white"/>
  <!-- Short thick conical beak (finch characteristic) -->
  <path d="M15.8 5.8c0.8-0.3 1.5 0 1.8 0.5 0.15 0.25 0.05 0.5-0.2 0.55L16 6.8z"/>
  <path d="M15.8 6.8c0.6 0.1 1 0.3 1.2 0.6 0.1 0.2-0.05 0.4-0.25 0.4L15.8 7.5z" opacity="0.85"/>
  <!-- Wing accent lines -->
  <line x1="8" y1="11" x2="13" y2="9.8" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" fill="none"/>
  <line x1="8.3" y1="12.5" x2="13.5" y2="11.3" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" fill="none"/>
  <line x1="8.8" y1="13.8" x2="13.5" y2="12.8" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" fill="none"/>
  <!-- Short tail (finch characteristic) -->
  <path d="M7.5 14c-0.8 0.5-1.2 1.2-1.5 2-0.05 0.15 0.05 0.25 0.15 0.18 0.5-0.4 1-1 1.3-1.6z" opacity="0.65"/>
  <path d="M7 13.5c-1 0.4-1.5 1-1.8 1.8-0.05 0.15 0.05 0.25 0.15 0.18 0.6-0.3 1.2-0.8 1.5-1.4z" opacity="0.5"/>
  <!-- Legs -->
  <line x1="10.5" y1="17.2" x2="10" y2="19.5" stroke="currentColor" stroke-width="0.6" stroke-linecap="round" fill="none"/>
  <line x1="13" y1="17.2" x2="13.5" y2="19.5" stroke="currentColor" stroke-width="0.6" stroke-linecap="round" fill="none"/>
  <!-- Feet -->
  <path d="M10 19.5c-0.3 0.2-0.5 0.3-0.7 0.25" fill="none" stroke="currentColor" stroke-width="0.5" stroke-linecap="round"/>
  <path d="M10 19.5c0.1 0.25 0.2 0.4 0.15 0.5" fill="none" stroke="currentColor" stroke-width="0.5" stroke-linecap="round"/>
  <path d="M13.5 19.5c0.3 0.2 0.5 0.3 0.7 0.25" fill="none" stroke="currentColor" stroke-width="0.5" stroke-linecap="round"/>
  <path d="M13.5 19.5c-0.1 0.25-0.2 0.4-0.15 0.5" fill="none" stroke="currentColor" stroke-width="0.5" stroke-linecap="round"/>
  <!-- Body dimension - extra round for finch -->
  <ellipse cx="11.5" cy="12.5" rx="3.5" ry="3.5" opacity="0.07"/>
  <!-- Breast color patch hint -->
  <ellipse cx="12.5" cy="10" rx="1.5" ry="2" opacity="0.08"/>
</svg>
