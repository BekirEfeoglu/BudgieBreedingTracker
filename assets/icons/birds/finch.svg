<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
  <!-- small round head -->
  <circle cx="10" cy="7" r="2.8"/>
  <!-- eye -->
  <circle cx="11" cy="6.2" r=".8" fill="currentColor"/>
  <!-- thick conical beak (finch signature - clearly triangular/filled) -->
  <polygon points="12.5,6.2 15.5,6.8 12.5,7.8" fill="currentColor" opacity=".25" stroke-width="1.5"/>
  <path d="M12.5 6.2l3 .6" stroke-width="1.7"/>
  <path d="M12.5 7.8l3-1" stroke-width="1.7"/>
  <!-- compact very round body (finch signature - rounder than others) -->
  <ellipse cx="10.5" cy="13.5" rx="4.2" ry="4.2" fill="currentColor" opacity=".06"/>
  <ellipse cx="10.5" cy="13.5" rx="4.2" ry="4.2"/>
  <!-- small wing -->
  <path d="M12.2 10.8c1.6.8 2.5 2.2 2.3 4" stroke-width="1.4"/>
  <path d="M10.8 12c1.2.5 2 1.2 2.2 2.3" stroke-width="1" opacity=".4"/>
  <!-- very short stubby tail (finch signature) -->
  <path d="M14 16.2l1.8 1.2" stroke-width="1.8"/>
  <path d="M13.8 17l1.2 1" stroke-width="1.4" opacity=".5"/>
  <!-- feet -->
  <path d="M8.2 17.3l-1 2.5M10 17.5l-.2 2.2" stroke-width="1.3"/>
</svg>
