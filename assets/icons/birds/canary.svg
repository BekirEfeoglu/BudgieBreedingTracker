<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
  <!-- small round head -->
  <circle cx="9.5" cy="6" r="2.6"/>
  <!-- eye -->
  <circle cx="10.5" cy="5.4" r=".8" fill="currentColor"/>
  <!-- small pointed beak - open (singing canary signature) -->
  <path d="M12 5.2l2.5-.4" stroke-width="1.6"/>
  <path d="M12 6.5l2.2.5" stroke-width="1.6"/>
  <!-- song notes (canary singing signature) -->
  <path d="M16 3.5c.3-.4.7-.3.8.1M17.2 4c.3-.4.7-.3.8.1" stroke-width="1.2" opacity=".4"/>
  <!-- plump round body -->
  <ellipse cx="10" cy="13" rx="4.5" ry="4.8" fill="currentColor" opacity=".06"/>
  <ellipse cx="10" cy="13" rx="4.5" ry="4.8"/>
  <!-- wing -->
  <path d="M11.8 10.2c2 1 3 2.8 2.6 5" stroke-width="1.5"/>
  <path d="M10.8 11.5c1.3.5 2.2 1.6 2.2 3" stroke-width="1.1" opacity=".4"/>
  <!-- short fan tail (canary signature - spread) -->
  <path d="M13.5 15.8l3.8 1.5" stroke-width="1.7"/>
  <path d="M13.8 16.8l3.2 2.2" stroke-width="1.5"/>
  <path d="M13.2 17.5l2.2 2.8" stroke-width="1.2" opacity=".5"/>
  <!-- feet -->
  <path d="M7.8 17.5l-1 2.5M9.5 17.8l-.2 2.2" stroke-width="1.3"/>
</svg>
