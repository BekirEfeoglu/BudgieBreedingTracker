  <circle cx="21" cy="5" r=".5" stroke-width="1.2"/>
  <path d="M21.5 5v2"/>
  <circle cx="19.5" cy="3.5" r=".5" stroke-width="1.2"/>
  <path d="M20 3.5v2"/>
  <!-- Wing - smooth curve -->
  <path d="M8.5 10c2-.3 4 0 5.5.8"/>
  <!-- Short fan tail -->
  <path d="M7 13.5l-1.5 1.5"/>
  <path d="M7.5 14l-1 2.5"/>
  <path d="M8 14l0 2.5"/>
  <!-- Feet perched -->
  <path d="M10 18.5l-.5 2"/>
  <path d="M12 18l.5 2"/>
