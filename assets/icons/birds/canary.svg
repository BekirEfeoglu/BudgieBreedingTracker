<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <!-- Canary: round plump body, short tail, small conical beak, singing -->
  <!-- Body - rounder and plumper than budgie -->
  <path d="M11 6.5c-2.5.2-4 2-4 4.5 0 2 .8 3.5 2 4.5l-.5 1.5-.5 2h2l.5-1.8.8.3c1.5 0 2.8-.5 3.8-1.5 1-1.2 1.5-2.8 1.5-4.5 0-2-1-3.5-2.8-4.3-.6-1-1.8-1.5-3.2-1.5z"/>
  <!-- Eye -->
  <circle cx="14" cy="9" r="1" fill="currentColor" stroke="none"/>
  <!-- Small conical beak - slightly open (singing) -->
  <path d="M16.8 8l2.2-.8"/>
  <path d="M16.8 9.5l2 1"/>
