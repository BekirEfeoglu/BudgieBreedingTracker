<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
  <!-- head -->
  <circle cx="10.5" cy="8" r="3"/>
  <!-- tall curved crest — cockatiel's most distinctive feature -->
  <path d="M9 5.2C8.2 3 7.8 1.2 8.5.4c.5-.5 1.2-.2 1.5.6.4 1 .6 2 .5 3" stroke-width="2.2"/>
  <path d="M10.2 5C9.8 3.5 9.8 2.2 10.3 1.5" stroke-width="1.4" opacity=".4"/>
  <!-- eye -->
  <circle cx="11.5" cy="7.2" r=".85" fill="currentColor"/>
  <!-- orange cheek patch — prominent filled circle -->
  <circle cx="12.3" cy="9.2" r="1.6" fill="currentColor" opacity=".2" stroke="none"/>
  <circle cx="12.3" cy="9.2" r="1.6" stroke-width="1" opacity=".45"/>
  <!-- curved hooked beak -->
  <path d="M13.3 7.5c.8-.1 1.4.4 1.3 1s-.6 1-1.1.9" stroke-width="1.6" fill="currentColor" opacity=".1"/>
  <!-- elongated body -->
  <path d="M8.8 10.8c-2.4.8-3.8 2.5-3.8 4.8 0 2.2 1.4 3.4 3.5 3.4h3.8"/>
  <path d="M12.5 10.3c2 .9 3 2.5 2.7 4.6-.2 1.4-1 2.2-2 2.8"/>
  <!-- wing -->
  <path d="M8.5 12.5c1.6-.1 3.2.3 4.3 1" stroke-width="1.2" opacity=".4"/>
  <path d="M8.2 14c1.4 0 2.8.3 3.8.8" stroke-width="1" opacity=".3"/>
  <!-- long tail -->
  <path d="M12 18.5l3.8 3.5" stroke-width="1.8"/>
  <path d="M11.2 18.5l3 3.5" stroke-width="1.3" opacity=".5"/>
  <!-- feet -->
  <path d="M7.5 18.8l-1 2M9 18.8l-.3 2" stroke-width="1.3"/>
</svg>
