  <ellipse cx="12" cy="12" rx="3.8" ry="9.5" fill="none" stroke="currentColor" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Horizontal latitude lines -->
  <path d="M3.2 9h17.6" fill="none" stroke="currentColor" stroke-width="0.7" stroke-linecap="round"/>
  <path d="M2.5 12h19" fill="none" stroke="currentColor" stroke-width="0.7" stroke-linecap="round"/>
  <path d="M3.2 15h17.6" fill="none" stroke="currentColor" stroke-width="0.7" stroke-linecap="round"/>
</svg>
