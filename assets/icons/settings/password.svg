<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
  <!-- Key: circular head with cutout, blade with two teeth -->
  <!-- Key head -->
  <circle cx="8" cy="12" r="4.5"/>
  <!-- Key head hole -->
  <circle cx="8" cy="12" r="1.8" fill="white"/>
  <!-- Key blade -->
  <rect x="11.5" y="10.8" width="10" height="2.4" rx="0.6"/>
  <!-- Tooth 1 -->
  <rect x="17" y="13.2" width="1.8" height="2.2" rx="0.4"/>
  <!-- Tooth 2 -->
  <rect x="20" y="13.2" width="1.5" height="3" rx="0.4"/>
</svg>
