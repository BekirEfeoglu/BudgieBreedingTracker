<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
  <!-- Split circle: left half sun with rays, right half moon with crescent -->
  <!-- Right half (dark/moon side) -->
  <path d="M12 3a9 9 0 1 1 0 18 9 9 0 0 1 0-18Z"/>
  <!-- Left half cleared to white -->
  <path d="M12 3a9 9 0 0 0 0 18V3Z" fill="white"/>
  <!-- Sun half-disc on left -->
  <path d="M12 6.5a5.5 5.5 0 0 0 0 11V6.5Z"/>
  <!-- Sun rays (left side) -->
  <line x1="12" y1="3.2" x2="12" y2="5" stroke="currentColor" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="5.8" y1="5.8" x2="7" y2="7" stroke="currentColor" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="3.2" y1="12" x2="5" y2="12" stroke="currentColor" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="5.8" y1="18.2" x2="7" y2="17" stroke="currentColor" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="12" y1="20.8" x2="12" y2="19" stroke="currentColor" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Moon crescent cutout on right -->
  <circle cx="15" cy="10" r="3.8" fill="white"/>
</svg>
