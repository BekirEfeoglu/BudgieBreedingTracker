name: budgie_breeding_tracker
description: Muhabbet Kusu Ureme Takip Uygulamasi
publish_to: 'none'
version: 1.0.5+19

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^17.0.0

  # Backend
  supabase_flutter: ^2.5.0
  firebase_core: ^4.1.1
  firebase_messaging: ^16.0.1

  # Local Database
  drift: ^2.31.0
  sqlite3_flutter_libs: ^0.5.41
  path: ^1.9.0

  # Data Classes
  freezed_annotation: ^3.0.0
  json_annotation: ^4.11.0

  # Charts
  fl_chart: ^1.2.0

  # PDF & Excel
  pdf: ^3.10.0
  excel: ^4.0.0

  # Localization
  easy_localization: ^3.0.0

  # Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2

  # UI
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  image_picker: ^1.0.0
  photo_view: ^0.15.0

  # Utilities
  intl: ^0.20.0
  uuid: ^4.3.0
  path_provider: ^2.1.0
  share_plus: ^12.0.0
  file_picker: ^10.0.0
  url_launcher: ^6.2.0
  connectivity_plus: ^7.0.0
  package_info_plus: ^9.0.0
  flutter_secure_storage: ^10.0.0
  encrypt: ^5.0.3
  shared_preferences: ^2.2.0
  logger: ^2.0.0
  purchases_flutter: ^9.14.0
  crypto: ^3.0.3
  http: ^1.5.0

  # Ads
  google_mobile_ads: ^7.0.0

  # Error Tracking
  sentry_flutter: ^9.0.0

  # Icons
  lucide_icons: ^0.257.0
  flutter_svg: ^2.0.10+1
  sign_in_with_apple: ^7.0.1
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.13.0
  riverpod_generator: ^4.0.0
  freezed: ^3.0.0
  json_serializable: ^6.13.0
  drift_dev: ^2.31.0

  # Testing
  mocktail: ^1.0.0
  fake_async: ^1.3.0

  # Icon Generation
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  # path_provider_foundation 2.6.0 switched iOS/macOS path resolution to a
  # direct FFI Foundation implementation. On this simulator/runtime
  # combination, objective_c native asset loading is broken, which cascades
  # into local DB, notifications, sync, and stats failures. Pinning 2.5.1
  # restores the plugin-based implementation while upstream FFI issues are
  # investigated.
  path_provider_foundation: 2.5.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  image_path_ios: "assets/images/app_icon_ios.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#0C1624"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/images/
    - assets/icons/navigation/
    - assets/icons/birds/
    - assets/icons/breeding/
    - assets/icons/eggs/
    - assets/icons/chicks/
    - assets/icons/genetics/
    - assets/icons/admin/
    - assets/icons/settings/
    - assets/icons/general/
    - assets/icons/community/
    - assets/fonts/
