name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

  test:
    name: Flutter Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: |
          flutter test \
            --exclude-tags "golden || e2e" \
            --coverage \
            --dart-define=SUPABASE_URL=https://placeholder.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=placeholder_key

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  golden-test:
    name: Golden Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Regenerate golden masters for Linux
        run: |
          flutter test test/golden \
            --update-goldens \
            --tags golden \
            --dart-define=SUPABASE_URL=https://placeholder.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=placeholder_key

      - name: Verify golden tests pass
        run: |
          flutter test test/golden \
            --tags golden \
            --dart-define=SUPABASE_URL=https://placeholder.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=placeholder_key

      - name: Upload golden failure artifacts
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: golden-failures-${{ github.run_id }}
          path: |
            **/failures/*.png
            **/failures/*.txt
            **/golden_failures/*.png
            **/golden_failures/*.txt
          if-no-files-found: ignore

  scripts-test:
    name: Scripts Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.x"

      - name: Install coverage
        run: python -m pip install coverage

      - name: Run all script unit tests with coverage
        run: |
          python -m coverage run --source=scripts --omit="scripts/test_*.py" \
            -m unittest discover -s scripts -p "test_*.py" -v --failfast
          python -m coverage report --include="scripts/*.py" --omit="scripts/test_*.py" \
            --fail-under=98
          python -m coverage html --include="scripts/*.py" --omit="scripts/test_*.py" \
            -d coverage-html

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: scripts-coverage-${{ github.run_id }}
          path: coverage-html/
          if-no-files-found: ignore

  l10n-sync:
    name: Localization Sync
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.x"

      - name: Check translation sync
        run: python scripts/check_l10n_sync.py --strict-keys

  code-quality:
    name: Code Quality
    runs-on: ubuntu-24.04
    needs: [scripts-test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.x"

      - name: Anti-pattern scan
        run: python scripts/verify_code_quality.py

  rules-sync:
    name: Rules Sync
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.x"

      - name: Verify CLAUDE.md stats match codebase
        run: python scripts/verify_rules.py --strict

  auto-fix-stats:
    name: Auto-fix Stats
    runs-on: ubuntu-24.04
    # Sadece main branch'e push'ta calis; scripts-test/rules-sync basarisiz olsa bile calisir
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [scripts-test, rules-sync, code-quality]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Token ile checkout: bot commits icin gerekli
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.x"

      - name: Run --fix and check for changes
        id: fix
        run: |
          python scripts/verify_rules.py --fix
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR if stats drifted
        if: steps.fix.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/auto-fix-stats-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add CLAUDE.md .claude/rules/CLAUDE.md
          git commit -m "chore: auto-fix CLAUDE.md stats to match codebase"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: auto-fix CLAUDE.md stats" \
            --body "CLAUDE.md istatistikleri codebase ile uyumsuz hale geldi. Bu PR \`verify_rules.py --fix\` ciktisini otomatik olarak uygular." \
            --base main \
            --head "$BRANCH"

  android-build:
    name: Android Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android APK (debug)
        run: |
          flutter build apk --debug \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

  ios-build:
    name: iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS (no codesign)
        run: |
          flutter build ios --no-codesign \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
