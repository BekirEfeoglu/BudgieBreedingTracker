name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

  test:
    name: Flutter Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        # --no-test-assets: Skips copying assets/ to the test runner. Safe because
        # tests use TestAssetLoader (keys-as-strings) not real translation files.
        # If a test needs real assets, tag it and exclude here.
        # --concurrency=4: Run tests in parallel for faster execution
        run: |
          flutter test \
            --exclude-tags "golden || e2e || community" \
            --no-test-assets \
            --coverage \
            --concurrency=4 \
            --dart-define=SUPABASE_URL=https://placeholder.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=placeholder_key
        timeout-minutes: 15

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  golden-test:
    name: Golden Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Regenerate golden masters for Linux
        run: |
          flutter test test/golden \
            --update-goldens \
            --tags golden \
            --dart-define=SUPABASE_URL=https://placeholder.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=placeholder_key

      - name: Verify golden tests pass
        run: |
          flutter test test/golden \
            --tags golden \
            --dart-define=SUPABASE_URL=https://placeholder.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=placeholder_key

      - name: Upload golden failure artifacts
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: golden-failures-${{ github.run_id }}
          path: |
            **/failures/*.png
            **/failures/*.txt
            **/golden_failures/*.png
            **/golden_failures/*.txt
          if-no-files-found: ignore

  scripts-test:
    name: Scripts Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.x"

      - name: Install coverage
        run: python -m pip install coverage

      - name: Run all script unit tests with coverage
        run: |
          python -m coverage run --source=scripts --omit="scripts/test_*.py" \
            -m unittest discover -s scripts -p "test_*.py" -v --failfast
          python -m coverage report --include="scripts/*.py" --omit="scripts/test_*.py" \
            --fail-under=98
          python -m coverage html --include="scripts/*.py" --omit="scripts/test_*.py" \
            -d coverage-html

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: scripts-coverage-${{ github.run_id }}
          path: coverage-html/
          if-no-files-found: ignore

  l10n-sync:
    name: Localization Sync
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.x"

      - name: Check translation sync
        run: python scripts/check_l10n_sync.py --strict-keys

  code-quality:
    name: Code Quality
    runs-on: ubuntu-24.04
    needs: [scripts-test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.x"

      - name: Anti-pattern scan
        run: python scripts/verify_code_quality.py

  rules-sync:
    name: Rules Sync
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.x"

      - name: Verify CLAUDE.md stats match codebase
        run: python scripts/verify_rules.py --strict

  auto-fix-stats:
    name: Auto-fix Stats
    runs-on: ubuntu-24.04
    # Sadece main branch'e push'ta calis; scripts-test/rules-sync basarisiz olsa bile calisir
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [scripts-test, rules-sync, code-quality]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Token ile checkout: bot commits icin gerekli
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.x"

      - name: Run --fix and check for changes
        id: fix
        run: |
          python scripts/verify_rules.py --fix
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR if stats drifted
        if: steps.fix.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/auto-fix-stats-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add CLAUDE.md
          git commit -m "chore: auto-fix CLAUDE.md stats to match codebase"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: auto-fix CLAUDE.md stats" \
            --body "CLAUDE.md istatistikleri codebase ile uyumsuz hale geldi. Bu PR \`verify_rules.py --fix\` ciktisini otomatik olarak uygular." \
            --base main \
            --head "$BRANCH"

  deploy-edge-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # Only deploy on main branch pushes, after tests pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: supabase/setup-cli@1.6.1
        with:
          version: latest

      - name: Deploy all Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy mfa-lockout --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy moderate-content --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy revoke-oauth-token --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy send-push --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy system-health --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy validate-free-tier-limit --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

  android-build:
    name: Android Build (Debug)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android APK (debug)
        run: |
          flutter build apk --debug \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }} \
            --dart-define=GOOGLE_IOS_CLIENT_ID=${{ secrets.GOOGLE_IOS_CLIENT_ID }}

  android-release:
    name: Android Release (AAB)
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    # Sadece main branch push'larinda release build yap
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode keystore from secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/budgie-release-key.jks

      - name: Create key.properties from secrets
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storePassword=${KEYSTORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=budgie-release-key.jks
          EOF

      - name: Build Android App Bundle (release)
        run: |
          flutter build appbundle --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }} \
            --dart-define=GOOGLE_IOS_CLIENT_ID=${{ secrets.GOOGLE_IOS_CLIENT_ID }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: android-release-${{ github.sha }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  ios-build:
    name: iOS Build
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS (no codesign)
        run: |
          flutter build ios --no-codesign \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }} \
            --dart-define=GOOGLE_IOS_CLIENT_ID=${{ secrets.GOOGLE_IOS_CLIENT_ID }}
