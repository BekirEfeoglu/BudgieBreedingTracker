name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

  test:
    name: Flutter Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: |
          flutter test \
            --exclude-tags "golden || e2e" \
            --coverage \
            --dart-define=SUPABASE_URL=https://placeholder.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=placeholder_key

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  golden-test:
    name: Golden Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Regenerate golden masters for Linux
        run: |
          flutter test test/golden \
            --update-goldens \
            --tags golden \
            --dart-define=SUPABASE_URL=https://placeholder.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=placeholder_key

      - name: Verify golden tests pass
        run: |
          flutter test test/golden \
            --tags golden \
            --dart-define=SUPABASE_URL=https://placeholder.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=placeholder_key

      - name: Upload golden failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: golden-failures-${{ github.run_id }}
          path: |
            **/failures/*.png
            **/failures/*.txt
            **/golden_failures/*.png
            **/golden_failures/*.txt
          if-no-files-found: ignore

  l10n-sync:
    name: Localization Sync
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Check translation sync
        run: python scripts/check_l10n_sync.py

  code-quality:
    name: Code Quality
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Anti-pattern scan
        run: python scripts/verify_code_quality.py

  android-build:
    name: Android Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android APK (debug)
        run: |
          flutter build apk --debug \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

  ios-build:
    name: iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS (no codesign)
        run: |
          flutter build ios --no-codesign \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
