name: Dependabot PR Triage

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  dependabot-triage:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Summarize dependency update
        run: |
          {
            echo "## Dependabot update"
            echo "- PR: $PR_URL"
            echo "- Dependency: $DEPENDENCY_NAMES"
            echo "- Update type: $UPDATE_TYPE"
            echo
            echo "Auto-merge is intentionally disabled in Actions."
            echo "GitHub runs Dependabot-triggered pull request workflows with a read-only token, so merge/label steps fail reliably in public repos."
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
