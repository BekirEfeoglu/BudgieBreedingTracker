<svg width="1024" height="1024" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#122318"/>
      <stop offset="50%" stop-color="#1B4332"/>
      <stop offset="100%" stop-color="#0C1F0F"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#F0D080"/>
      <stop offset="40%" stop-color="#D4A853"/>
      <stop offset="100%" stop-color="#B8862D"/>
    </linearGradient>
    <linearGradient id="body" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#5DBE8A"/>
      <stop offset="50%" stop-color="#40916C"/>
      <stop offset="100%" stop-color="#2D6A4F"/>
    </linearGradient>
    <linearGradient id="wing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D6A4F"/>
      <stop offset="100%" stop-color="#1B4332"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.35" r="0.5">
      <stop offset="0%" stop-color="rgba(212,168,83,0.12)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- Shield outline -->
  <path d="M256 60 C256 60 380 80 420 120 C460 160 450 320 256 460 C62 320 52 160 92 120 C132 80 256 60 256 60Z"
        fill="none" stroke="rgba(212,168,83,0.15)" stroke-width="2"/>

  <!-- Branch -->
  <path d="M120 340 Q200 330 260 350 Q320 370 400 345"
        fill="none" stroke="url(#gold)" stroke-width="6" stroke-linecap="round" filter="url(#shadow)"/>
  <path d="M180 335 Q170 310 160 295" fill="none" stroke="#B8862D" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M320 355 Q330 330 340 320" fill="none" stroke="#B8862D" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <ellipse cx="155" cy="290" rx="10" ry="6" fill="#2D6A4F" transform="rotate(-30 155 290)" opacity="0.7"/>
  <ellipse cx="345" cy="315" rx="10" ry="6" fill="#2D6A4F" transform="rotate(20 345 315)" opacity="0.7"/>

  <!-- Budgie -->
  <g filter="url(#shadow)">
    <!-- Tail -->
    <path d="M165 330 Q130 400 115 440 Q125 435 140 420 Q135 440 125 460 Q140 445 155 425 Q155 440 150 455 Q165 435 175 400 Q180 370 175 340Z"
          fill="url(#wing)" opacity="0.9"/>
    <!-- Body -->
    <ellipse cx="240" cy="280" rx="80" ry="90" fill="url(#body)" transform="rotate(-10 240 280)"/>
    <!-- Wing -->
    <path d="M195 240 Q180 280 185 330 Q210 310 250 300 Q290 290 300 260 Q280 240 250 235 Q220 230 195 240Z"
          fill="url(#wing)"/>
    <!-- Wing scallops -->
    <path d="M205 255 Q220 250 240 252" fill="none" stroke="rgba(163,184,153,0.3)" stroke-width="1.5"/>
    <path d="M200 268 Q222 263 248 265" fill="none" stroke="rgba(163,184,153,0.25)" stroke-width="1.5"/>
    <path d="M198 282 Q225 277 255 280" fill="none" stroke="rgba(163,184,153,0.2)" stroke-width="1.5"/>
    <path d="M197 296 Q224 291 258 294" fill="none" stroke="rgba(163,184,153,0.15)" stroke-width="1.5"/>
    <!-- Chest -->
    <ellipse cx="268" cy="300" rx="40" ry="55" fill="#5DBE8A" opacity="0.3" transform="rotate(-5 268 300)"/>
    <!-- Head -->
    <circle cx="290" cy="195" r="58" fill="url(#body)"/>
    <!-- Head stripes -->
    <path d="M255 165 Q275 155 300 158" fill="none" stroke="rgba(20,50,30,0.3)" stroke-width="2"/>
    <path d="M250 175 Q272 166 302 170" fill="none" stroke="rgba(20,50,30,0.25)" stroke-width="1.8"/>
    <path d="M248 185 Q270 177 305 182" fill="none" stroke="rgba(20,50,30,0.2)" stroke-width="1.5"/>
    <!-- Crown -->
    <path d="M265 152 Q285 135 315 148 Q305 140 290 138 Q275 140 265 152Z"
          fill="url(#gold)" opacity="0.8"/>
    <!-- Cheek -->
    <circle cx="315" cy="210" r="10" fill="#6B7DB3" opacity="0.5"/>
    <!-- Cere -->
    <ellipse cx="325" cy="188" rx="8" ry="5" fill="#5B8EBF" opacity="0.7"/>
    <!-- Eye -->
    <circle cx="305" cy="185" r="10" fill="#0C1F0F"/>
    <circle cx="305" cy="185" r="7" fill="#1a1a1a"/>
    <circle cx="305" cy="185" r="4.5" fill="#111"/>
    <circle cx="305" cy="185" r="6.5" fill="none" stroke="white" stroke-width="1.2" opacity="0.8"/>
    <circle cx="308" cy="182" r="2.5" fill="white" opacity="0.9"/>
    <!-- Beak -->
    <path d="M328 194 Q340 192 342 200 Q340 206 330 204 Q325 200 328 194Z" fill="#E8C27A"/>
    <path d="M328 198 Q335 197 340 200" fill="none" stroke="#B8862D" stroke-width="0.8" opacity="0.5"/>
    <!-- Feet -->
    <g fill="none" stroke="#7A9A70" stroke-width="2" stroke-linecap="round" opacity="0.8">
      <path d="M225 340 Q220 355 210 360 M225 340 Q228 358 225 365 M225 340 Q232 355 238 358"/>
      <path d="M265 345 Q260 360 252 365 M265 345 Q268 363 265 370 M265 345 Q272 360 278 363"/>
    </g>
  </g>

  <!-- Corner accents -->
  <path d="M40 40 L100 40 L40 100Z" fill="url(#gold)" opacity="0.08"/>
  <path d="M472 472 L412 472 L472 412Z" fill="url(#gold)" opacity="0.08"/>
  <rect x="24" y="24" width="464" height="464" rx="32" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.15"/>
</svg>
