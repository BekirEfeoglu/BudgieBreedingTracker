<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="120" r="200" fill="#3B82F6" opacity="0.06"/>
  <circle cx="200" cy="500" r="150" fill="#22C55E" opacity="0.05"/>
  <circle cx="1100" cy="500" r="120" fill="#F59E0B" opacity="0.04"/>

  <!-- Logo placeholder circle -->
  <g filter="shadow">
    <rect x="80" y="180" width="160" height="160" rx="36" fill="#1E40AF"/>
    <text x="160" y="285" text-anchor="middle" font-size="80" fill="white">🐦</text>
  </g>

  <!-- App name -->
  <text x="280" y="240" font-family="Inter, -apple-system, sans-serif" font-weight="900" font-size="56" fill="url(#textGrad)">BudgieBreeding</text>
  <text x="280" y="310" font-family="Inter, -apple-system, sans-serif" font-weight="900" font-size="56" fill="url(#accentGrad)">Tracker</text>

  <!-- Tagline -->
  <text x="280" y="370" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="24" fill="#94A3B8">Muhabbet kuşu yetiştiricileri için kapsamlı üreme takip uygulaması</text>

  <!-- Feature pills -->
  <g font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="18">
    <!-- Pill 1 -->
    <rect x="80" y="430" width="180" height="44" rx="22" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1.5" opacity="0.8"/>
    <text x="116" y="458" fill="#93C5FD">🐤 Kuş Takibi</text>

    <!-- Pill 2 -->
    <rect x="280" y="430" width="200" height="44" rx="22" fill="#1E3A5F" stroke="#22C55E" stroke-width="1.5" opacity="0.8"/>
    <text x="316" y="458" fill="#86EFAC">🧬 Genetik Analiz</text>

    <!-- Pill 3 -->
    <rect x="500" y="430" width="180" height="44" rx="22" fill="#1E3A5F" stroke="#F59E0B" stroke-width="1.5" opacity="0.8"/>
    <text x="536" y="458" fill="#FDE68A">📊 İstatistikler</text>

    <!-- Pill 4 -->
    <rect x="700" y="430" width="200" height="44" rx="22" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1.5" opacity="0.8"/>
    <text x="736" y="458" fill="#93C5FD">☁️ Bulut Sync</text>

    <!-- Pill 5 -->
    <rect x="920" y="430" width="190" height="44" rx="22" fill="#1E3A5F" stroke="#22C55E" stroke-width="1.5" opacity="0.8"/>
    <text x="956" y="458" fill="#86EFAC">🥚 Üreme Takibi</text>
  </g>

  <!-- Languages -->
  <g font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="16">
    <rect x="80" y="510" width="60" height="34" rx="8" fill="#1E40AF" opacity="0.6"/>
    <text x="96" y="533" fill="white">🇹🇷 TR</text>

    <rect x="152" y="510" width="64" height="34" rx="8" fill="#1E40AF" opacity="0.4"/>
    <text x="168" y="533" fill="#93C5FD">🇬🇧 EN</text>

    <rect x="228" y="510" width="64" height="34" rx="8" fill="#1E40AF" opacity="0.4"/>
    <text x="244" y="533" fill="#93C5FD">🇩🇪 DE</text>
  </g>

  <!-- Platform badges -->
  <g font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="15" fill="#64748B">
    <text x="80" y="590">iOS &amp; Android</text>
    <text x="250" y="590">•</text>
    <text x="270" y="590">Offline-First</text>
    <text x="420" y="590">•</text>
    <text x="440" y="590">Ücretsiz Başla</text>
  </g>

  <!-- Domain -->
  <text x="1120" y="590" text-anchor="end" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="16" fill="#475569">budgiebreedingtracker.online</text>
</svg>
