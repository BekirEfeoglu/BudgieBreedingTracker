<svg width="1024" height="1024" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#163A27"/>
      <stop offset="45%" stop-color="#1B4332"/>
      <stop offset="100%" stop-color="#0E1F12"/>
    </linearGradient>
    <linearGradient id="body" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0%" stop-color="#72D4A0"/>
      <stop offset="35%" stop-color="#52B788"/>
      <stop offset="100%" stop-color="#3D8B63"/>
    </linearGradient>
    <linearGradient id="wing" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#3D8B63"/>
      <stop offset="100%" stop-color="#285C42"/>
    </linearGradient>
    <linearGradient id="tail" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#347A58"/>
      <stop offset="100%" stop-color="#1B4332"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5DC90"/>
      <stop offset="40%" stop-color="#D4A853"/>
      <stop offset="100%" stop-color="#B8912E"/>
    </linearGradient>
    <linearGradient id="gold-bright" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFE8A0"/>
      <stop offset="50%" stop-color="#E8C060"/>
      <stop offset="100%" stop-color="#C89830"/>
    </linearGradient>
    <radialGradient id="center-glow" cx="0.48" cy="0.42" r="0.32">
      <stop offset="0%" stop-color="rgba(212,168,83,0.10)"/>
      <stop offset="60%" stop-color="rgba(82,183,136,0.04)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A853" stop-opacity="0.35"/>
      <stop offset="30%" stop-color="#52B788" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#D4A853" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#52B788" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="crown-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="eye-glow">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#D4A853" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <rect width="512" height="512" rx="110" fill="url(#center-glow)"/>

  <!-- Outer decorative ring -->
  <circle cx="256" cy="238" r="195" fill="none" stroke="url(#ring)" stroke-width="1.2"/>
  <!-- Inner subtle ring -->
  <circle cx="256" cy="238" r="178" fill="none" stroke="rgba(163,184,153,0.06)" stroke-width="0.8"/>

  <!-- ═══ BUDGIE ═══ -->
  <g filter="url(#shadow)" transform="translate(252, 232) scale(1.15)">

    <!-- Tail — elegant, three feathers -->
    <path d="M-72 45 Q-95 95 -100 130 Q-88 120 -78 105 Q-82 125 -88 142 Q-75 125 -65 100 Q-62 60 -60 42Z"
          fill="url(#tail)" opacity="0.9"/>
    <path d="M-60 48 Q-78 100 -80 135 Q-70 122 -62 108 Q-65 128 -70 145 Q-58 125 -50 95 Q-48 62 -50 45Z"
          fill="url(#wing)" opacity="0.8"/>

    <!-- Body -->
    <ellipse cx="2" cy="12" rx="68" ry="78" fill="url(#body)" transform="rotate(-6)"/>

    <!-- Chest shimmer -->
    <ellipse cx="20" cy="28" rx="32" ry="48" fill="rgba(114,212,160,0.2)" transform="rotate(-4)"/>
    <!-- Belly highlight -->
    <ellipse cx="15" cy="50" rx="22" ry="28" fill="rgba(200,216,194,0.08)"/>

    <!-- Wing -->
    <path d="M-30 -22 Q-48 18 -42 62 Q-20 46 14 38 Q48 28 56 -2 Q42 -18 16 -24 Q-8 -28 -30 -22Z"
          fill="url(#wing)"/>
    <!-- Wing scallop lines -->
    <path d="M-18 -6 Q2 -12 22 -8" fill="none" stroke="rgba(163,184,153,0.30)" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M-22 8 Q2 2 26 6" fill="none" stroke="rgba(163,184,153,0.22)" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M-24 22 Q2 16 28 20" fill="none" stroke="rgba(163,184,153,0.16)" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M-24 35 Q2 29 30 33" fill="none" stroke="rgba(163,184,153,0.10)" stroke-width="1" stroke-linecap="round"/>

    <!-- Head -->
    <circle cx="46" cy="-50" r="48" fill="url(#body)"/>
    <!-- Forehead lighter area -->
    <ellipse cx="50" cy="-65" rx="28" ry="18" fill="rgba(114,212,160,0.12)" transform="rotate(-5 50 -65)"/>

    <!-- Head stripes -->
    <path d="M16 -75 Q32 -84 56 -80" fill="none" stroke="rgba(18,45,28,0.28)" stroke-width="2" stroke-linecap="round"/>
    <path d="M14 -65 Q34 -73 60 -69" fill="none" stroke="rgba(18,45,28,0.22)" stroke-width="1.7" stroke-linecap="round"/>
    <path d="M12 -55 Q36 -63 62 -59" fill="none" stroke="rgba(18,45,28,0.15)" stroke-width="1.4" stroke-linecap="round"/>

    <!-- ★ Crown — signature gold crest (larger, more prominent) -->
    <g filter="url(#crown-glow)">
      <path d="M22 -92 Q30 -114 42 -105 Q48 -116 58 -107 Q66 -118 74 -105
              Q68 -98 58 -102 Q50 -108 42 -100 Q34 -106 26 -95Z"
            fill="url(#gold-bright)"/>
      <!-- Crown tips highlight -->
      <circle cx="30" cy="-108" r="2.5" fill="#FFE8A0" opacity="0.7"/>
      <circle cx="48" cy="-113" r="3" fill="#FFE8A0" opacity="0.8"/>
      <circle cx="66" cy="-112" r="2.5" fill="#FFE8A0" opacity="0.7"/>
    </g>

    <!-- Cheek patches (both sides visible in 3/4 view) -->
    <ellipse cx="70" cy="-38" rx="10" ry="8.5" fill="#7986BF" opacity="0.4" transform="rotate(8 70 -38)"/>
    <ellipse cx="22" cy="-36" rx="6" ry="5" fill="#7986BF" opacity="0.15" transform="rotate(-8 22 -36)"/>

    <!-- Cere -->
    <ellipse cx="76" cy="-55" rx="7.5" ry="4.5" fill="#6B9CC0" opacity="0.55"/>

    <!-- Eye — expressive, gold ring -->
    <g filter="url(#eye-glow)">
      <circle cx="58" cy="-52" r="10" fill="#0C1F0F"/>
      <circle cx="58" cy="-52" r="7.5" fill="#161616"/>
      <circle cx="58" cy="-52" r="4.5" fill="#0a0a0a"/>
      <circle cx="58" cy="-52" r="7" fill="none" stroke="rgba(212,168,83,0.75)" stroke-width="1.2"/>
      <!-- Catchlights -->
      <circle cx="61" cy="-55" r="3" fill="white" opacity="0.92"/>
      <circle cx="55" cy="-49" r="1.2" fill="white" opacity="0.4"/>
    </g>

    <!-- Beak — sharp, golden -->
    <path d="M80 -46 Q96 -50 98 -40 Q95 -33 84 -36 Q78 -40 80 -46Z" fill="url(#gold)"/>
    <path d="M82 -41 Q90 -43 96 -40" fill="none" stroke="#A07830" stroke-width="0.8" opacity="0.6"/>

    <!-- Feet -->
    <g fill="none" stroke="#7A9A6E" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
      <path d="M-10 70 Q-16 84 -24 88"/>
      <path d="M-10 70 Q-8 86 -10 92"/>
      <path d="M-10 70 Q-2 84 4 88"/>
      <path d="M22 73 Q16 87 10 92"/>
      <path d="M22 73 Q24 90 22 96"/>
      <path d="M22 73 Q30 87 35 90"/>
    </g>
  </g>

  <!-- Bottom accent — thin gold arc -->
  <path d="M180 445 Q256 460 332 445" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>

  <!-- Corner sparkles (very subtle) -->
  <circle cx="80" cy="80" r="1.5" fill="#D4A853" opacity="0.15"/>
  <circle cx="432" cy="80" r="1.5" fill="#D4A853" opacity="0.15"/>
  <circle cx="80" cy="432" r="1.5" fill="#D4A853" opacity="0.1"/>
  <circle cx="432" cy="432" r="1.5" fill="#D4A853" opacity="0.1"/>
</svg>
