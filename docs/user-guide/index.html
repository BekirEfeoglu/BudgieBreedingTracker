  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --forest-deep: #0F1B4D;
      --forest-mid: #162560;
      --leaf-dark: #1E3F7A;
      --leaf-mid: #3366B8;
      --leaf-light: #5599DD;
      --sage: #B0CFEE;
      --sage-light: #E0EBF8;
      --gold: #F5C842;
      --gold-light: #FFD95A;
      --gold-glow: #FFE680;
      --glass-bg: rgba(25, 55, 120, 0.35);
      --glass-border: rgba(160, 200, 240, 0.2);
      --glass-border-hover: rgba(245, 200, 66, 0.45);
      --tip-bg: rgba(74, 143, 212, 0.12);
      --tip-border: rgba(74, 143, 212, 0.35);
      --warning-bg: rgba(212, 168, 83, 0.12);
      --warning-border: rgba(212, 168, 83, 0.35);
      --premium-bg: rgba(245, 200, 66, 0.1);
      --premium-border: rgba(245, 200, 66, 0.35);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background-color: var(--forest-deep);
      color: var(--sage-light);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 1000;
      mix-blend-mode: overlay;
    }

    .bg-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .bg-layer::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 80%, rgba(20, 50, 100, 0.8) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(30, 70, 140, 0.4) 0%, transparent 55%),
        radial-gradient(ellipse 100% 100% at 50% 50%, var(--forest-deep) 0%, #071535 100%);
    }

    .bg-layer::after {
      content: '';
      position: absolute;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(245, 200, 66, 0.07) 0%, transparent 70%);
      border-radius: 50%;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      animation: orbPulse ease-in-out infinite;
    }
    .orb-1 { width: 500px; height: 500px; top: -150px; right: -100px; background: radial-gradient(circle, rgba(30, 70, 140, 0.18) 0%, transparent 70%); animation-duration: 12s; }
    .orb-2 { width: 400px; height: 400px; bottom: -100px; left: -80px; background: radial-gradient(circle, rgba(20, 50, 100, 0.25) 0%, transparent 70%); animation-duration: 16s; animation-delay: -5s; }
    .orb-3 { width: 300px; height: 300px; top: 40%; right: 5%; background: radial-gradient(circle, rgba(245, 200, 66, 0.06) 0%, transparent 70%); animation-duration: 20s; animation-delay: -8s; }

    @keyframes orbPulse {
      0%, 100% { transform: scale(1);    opacity: 0.7; }
      50%       { transform: scale(1.12); opacity: 1;   }
    }

    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
    .particle { position: absolute; border-radius: 50% 0 50% 0; animation: drift linear infinite; opacity: 0; }
    .particle.leaf  { border-radius: 0 100% 0 100%; }
    .particle.feather { width: 3px; border-radius: 50%; background: linear-gradient(180deg, transparent, var(--sage), transparent); }
    .particle:nth-child(1)  { left: 8%;   width: 12px; height: 18px; background: rgba(140,180,220,0.25); animation-duration: 18s; animation-delay: 0s;    top: -20px; }
    .particle:nth-child(2)  { left: 16%;  width: 8px;  height: 12px; background: rgba(245,200,66,0.2);   animation-duration: 22s; animation-delay: -4s;   top: -20px; }
    .particle:nth-child(3)  { left: 25%;  width: 15px; height: 22px; background: rgba(50,120,200,0.3);   animation-duration: 15s; animation-delay: -8s;   top: -20px; }
    .particle:nth-child(4)  { left: 35%;  width: 6px;  height: 10px; background: rgba(140,180,220,0.2);  animation-duration: 25s; animation-delay: -2s;   top: -20px; }
    .particle:nth-child(5)  { left: 44%;  width: 10px; height: 16px; background: rgba(245,200,66,0.15);  animation-duration: 20s; animation-delay: -12s;  top: -20px; }
    .particle:nth-child(6)  { left: 55%;  width: 14px; height: 20px; background: rgba(50,120,200,0.25);  animation-duration: 17s; animation-delay: -6s;   top: -20px; }
    .particle:nth-child(7)  { left: 63%;  width: 7px;  height: 11px; background: rgba(140,180,220,0.3);  animation-duration: 23s; animation-delay: -10s;  top: -20px; }
    .particle:nth-child(8)  { left: 72%;  width: 11px; height: 17px; background: rgba(245,200,66,0.2);   animation-duration: 19s; animation-delay: -3s;   top: -20px; }
    .particle:nth-child(9)  { left: 82%;  width: 9px;  height: 13px; background: rgba(30,70,140,0.3);    animation-duration: 21s; animation-delay: -7s;   top: -20px; }
    .particle:nth-child(10) { left: 91%;  width: 13px; height: 19px; background: rgba(140,180,220,0.2);  animation-duration: 16s; animation-delay: -15s;  top: -20px; }

    @keyframes drift {
      0%   { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
      5%   { opacity: 0.8; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(110vh) rotate(360deg) translateX(40px); opacity: 0; }
    }

    /* ─── HEADER ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(12, 31, 15, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
    }

    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    @media (min-width: 640px) { .header-inner { padding: 16px 32px; } }

    .logo-link {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .logo-link:hover { opacity: 0.85; }

    .logo-img {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid rgba(245, 200, 66, 0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .logo-link:hover .logo-img {
      transform: scale(1.08) rotate(-3deg);
      box-shadow: 0 0 12px rgba(245, 200, 66, 0.3);
    }

    .logo-text {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 16px;
      color: var(--gold-light);
      letter-spacing: -0.02em;
    }
    @media (min-width: 640px) { .logo-text { font-size: 18px; } }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-link {
      font-size: 13px;
      font-weight: 500;
      color: var(--sage);
      text-decoration: none;
      transition: color 0.2s ease;
      white-space: nowrap;
    }
    .back-link:hover { color: var(--gold-light); }

    .lang-group {
      display: flex;
      gap: 4px;
      background: rgba(20, 50, 100, 0.3);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 4px;
    }

    .lang-btn {
      padding: 5px 12px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      border: none;
      background: transparent;
      color: var(--sage);
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.03em;
    }
    .lang-btn:hover { color: var(--gold-light); background: rgba(245, 200, 66, 0.1); }
    .lang-btn.active { background: rgba(245, 200, 66, 0.18); color: var(--gold-light); box-shadow: 0 0 0 1px rgba(245, 200, 66, 0.3); }

    /* ─── MAIN ─── */
    main {
      flex: 1;
      position: relative;
      z-index: 2;
      padding: 48px 20px 80px;
    }

    .container { max-width: 960px; margin: 0 auto; }

    /* ─── PAGE HEADER ─── */
    .page-header { text-align: center; margin-bottom: 40px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(20, 50, 100, 0.4);
      border: 1px solid rgba(245, 200, 66, 0.3);
      border-radius: 999px;
      padding: 6px 18px;
      margin-bottom: 20px;
    }
    .badge span {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold-light);
    }
    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 6px rgba(245, 200, 66, 0.6);
      animation: pulseDot 2s ease-in-out infinite;
    }
    @keyframes pulseDot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.6; transform: scale(0.8); }
    }

    .page-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.15;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--sage-light) 0%, var(--gold-light) 50%, var(--sage-light) 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 6s ease infinite;
      margin-bottom: 14px;
    }
    @keyframes shimmer {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .page-subtitle {
      font-size: 16px;
      color: var(--sage);
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.65;
    }

    /* ─── STATS BAR ─── */
    .guide-stats {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .guide-stat {
      text-align: center;
    }
    .guide-stat-value {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 28px;
      color: var(--gold-light);
      line-height: 1;
    }
    .guide-stat-label {
      font-size: 12px;
      color: var(--sage);
      margin-top: 4px;
      font-weight: 500;
    }

    /* ─── CATEGORY CHIPS ─── */
    .category-chips {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .category-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--sage);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .category-chip:hover {
      color: var(--gold-light);
      border-color: var(--glass-border-hover);
      background: rgba(245, 200, 66, 0.08);
    }
    .category-chip.active {
      color: var(--gold-light);
      background: rgba(245, 200, 66, 0.15);
      border-color: rgba(245, 200, 66, 0.4);
      box-shadow: 0 0 12px rgba(245, 200, 66, 0.1);
    }
    .category-chip-icon { font-size: 15px; }
    .category-chip-count {
      font-size: 11px;
      font-weight: 700;
      color: var(--gold);
      background: rgba(245, 200, 66, 0.12);
      padding: 1px 7px;
      border-radius: 999px;
      margin-left: 2px;
    }

    /* ─── SEARCH ─── */
    .search-wrap {
      max-width: 520px;
      margin: 0 auto 16px;
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 14px 20px 14px 48px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--sage-light);
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      outline: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .search-input::placeholder { color: rgba(163, 184, 153, 0.5); }
    .search-input:focus {
      border-color: rgba(245, 200, 66, 0.4);
      box-shadow: 0 0 0 3px rgba(245, 200, 66, 0.08), 0 4px 24px rgba(0,0,0,0.2);
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: var(--sage);
      pointer-events: none;
    }

    .search-clear {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: var(--sage);
      cursor: pointer;
      display: none;
      background: none;
      border: none;
      padding: 0;
      transition: color 0.2s;
    }
    .search-clear:hover { color: var(--gold-light); }
    .search-clear.visible { display: block; }

    .search-result-count {
      text-align: center;
      font-size: 13px;
      color: var(--sage);
      margin-bottom: 24px;
      display: none;
    }
    .search-result-count.visible { display: block; }
    .search-result-count strong { color: var(--gold-light); font-weight: 700; }

    .search-highlight {
      background: rgba(245, 200, 66, 0.25);
      color: var(--gold-light);
      border-radius: 3px;
      padding: 0 2px;
    }

    .topic-category-badge {
      font-size: 11px;
      font-weight: 600;
      color: var(--leaf-light);
      background: rgba(74, 143, 212, 0.1);
      border: 1px solid rgba(74, 143, 212, 0.2);
      padding: 2px 8px;
      border-radius: 999px;
    }

    /* ─── CATEGORY SECTION ─── */
    .category-section { margin-bottom: 40px; }

    .category-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-left: 4px;
    }

    .category-icon {
      font-size: 22px;
      line-height: 1;
    }

    .category-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: var(--sage-light);
      letter-spacing: -0.01em;
    }

    .category-count {
      font-size: 12px;
      font-weight: 600;
      color: var(--gold);
      background: rgba(245, 200, 66, 0.12);
      border: 1px solid rgba(245, 200, 66, 0.25);
      padding: 2px 10px;
      border-radius: 999px;
    }

    /* ─── TOPIC CARDS ─── */
    .topics-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 640px) { .topics-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 900px) { .topics-grid { grid-template-columns: repeat(3, 1fr); } }

    .topic-card {
      position: relative;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 22px;
      cursor: pointer;
      overflow: hidden;
      transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .topic-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 16px;
      right: 16px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(245, 200, 66, 0.4), transparent);
    }
    .topic-card:hover {
      border-color: var(--glass-border-hover);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 0 1px rgba(245, 200, 66, 0.15), 0 0 40px rgba(245, 200, 66, 0.06);
      transform: translateY(-3px);
    }

    .topic-card-header {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 10px;
    }

    .topic-icon-wrap {
      position: relative;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      background: rgba(20, 50, 100, 0.5);
      border: 1px solid var(--glass-border);
      transition: box-shadow 0.3s ease, border-color 0.3s ease;
    }
    .topic-card:hover .topic-icon-wrap {
      border-color: rgba(245, 200, 66, 0.35);
      box-shadow: 0 0 16px rgba(245, 200, 66, 0.15);
    }

    .topic-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--sage-light);
      line-height: 1.3;
      margin-bottom: 2px;
    }

    .topic-subtitle {
      font-size: 13px;
      color: var(--sage);
      line-height: 1.5;
    }

    .topic-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }

    .step-badge {
      font-size: 11px;
      font-weight: 600;
      color: var(--leaf-light);
      background: rgba(74, 143, 212, 0.12);
      border: 1px solid rgba(74, 143, 212, 0.25);
      padding: 2px 10px;
      border-radius: 999px;
    }

    .premium-badge {
      font-size: 11px;
      font-weight: 700;
      color: var(--gold);
      background: rgba(245, 200, 66, 0.12);
      border: 1px solid rgba(245, 200, 66, 0.3);
      padding: 2px 10px;
      border-radius: 999px;
      letter-spacing: 0.05em;
    }

    .topic-chevron {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--sage);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
    }
    .topic-card:hover .topic-chevron {
      opacity: 1;
      transform: translateY(-50%) translateX(3px);
    }

    /* ─── DETAIL OVERLAY ─── */
    .detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(11, 26, 61, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      animation: fadeIn 0.2s ease;
    }
    .detail-overlay.active { display: flex; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 40px 20px; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    .detail-panel {
      position: relative;
      width: 100%;
      max-width: 720px;
      background: rgba(15, 34, 71, 0.95);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 36px 32px 40px;
      animation: slideUp 0.3s ease;
      overflow: hidden;
    }
    .detail-panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 24px;
      right: 24px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(245, 200, 66, 0.5), transparent);
    }

    @media (max-width: 639px) {
      .detail-panel { padding: 28px 20px 32px; border-radius: 20px; }
    }

    .detail-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border: 1px solid var(--glass-border);

    let currentLang = 'tr';

    // ─── HELPERS ───
    const turkishFold = { '\u015f': 's', '\u00e7': 'c', '\u011f': 'g', '\u00fc': 'u', '\u00f6': 'o', '\u0131': 'i', '\u0130': 'i', '\u015e': 's', '\u00c7': 'c', '\u011e': 'g', '\u00dc': 'u', '\u00d6': 'o', '\u00e4': 'a', '\u00f1': 'n', '\u00df': 'ss' };
    function normalize(str) {
      return str.toLowerCase().replace(/[şçğüöıİŞÇĞÜÖäñß]/g, c => turkishFold[c] || c);
    }

    function getStepCount(topic) {
      const data = topic[currentLang];
      let count = 0;
      for (const block of data.blocks) {
        if (block.type === 'steps' && block.steps) count += block.steps.length;
      }
      return count;
    }

    function getTotalSteps() {
      let total = 0;
      topics.forEach(t => { total += getStepCount(t); });
      return total;
    }

    function renderStats() {
      const t = uiTranslations[currentLang];
      document.getElementById('guideStats').innerHTML = `
        <div class="guide-stat"><div class="guide-stat-value">${topics.length}</div><div class="guide-stat-label">${t.stat_topics}</div></div>
        <div class="guide-stat"><div class="guide-stat-value">${categories.length}</div><div class="guide-stat-label">${t.stat_categories}</div></div>
        <div class="guide-stat"><div class="guide-stat-value">${getTotalSteps()}</div><div class="guide-stat-label">${t.stat_steps}</div></div>
      `;
    }

    function renderCategoryChips() {
      const t = uiTranslations[currentLang];
      let html = `<button class="category-chip ${activeCategory === null ? 'active' : ''}" onclick="filterCategory(null)"><span>${t.all_categories}</span><span class="category-chip-count">${topics.length}</span></button>`;
      categories.forEach(cat => {
        const count = topics.filter(t => t.category === cat.id).length;
        html += `<button class="category-chip ${activeCategory === cat.id ? 'active' : ''}" onclick="filterCategory('${cat.id}')"><span class="category-chip-icon">${cat.icon}</span><span>${cat[currentLang]}</span><span class="category-chip-count">${count}</span></button>`;
      });
      document.getElementById('categoryChips').innerHTML = html;
    }

    function filterCategory(catId) {
      activeCategory = catId;
      renderCategoryChips();
      renderGuide(document.getElementById('searchInput').value);
    }

    function highlightText(text, query) {
      if (!query) return text;
      const nText = normalize(text);
      const nQuery = normalize(query);
      const idx = nText.indexOf(nQuery);
      if (idx === -1) return text;
      return text.slice(0, idx) + '<span class="search-highlight">' + text.slice(idx, idx + query.length) + '</span>' + text.slice(idx + query.length);
    }

    // ─── RENDER ───
    function renderGuide(query) {
      const container = document.getElementById('guideContent');
      const noResults = document.getElementById('noResults');
      const resultCountEl = document.getElementById('searchResultCount');
      const t = uiTranslations[currentLang];
      const q = normalize(query || '');

      let html = '';
      let totalVisible = 0;

      // Filter by category
      let filteredTopics = activeCategory ? topics.filter(t => t.category === activeCategory) : topics;

      if (q) {
        // Flat search mode
        const matching = filteredTopics.filter(topic => {
          const data = topic[currentLang];
          const haystack = normalize(data.title + ' ' + data.subtitle + ' ' + data.blocks.map(b => b.text || (b.steps || []).join(' ')).join(' '));
          return haystack.includes(q);
        });

        totalVisible = matching.length;

        if (matching.length > 0) {
          html += '<div class="topics-grid">';
          matching.forEach((topic, i) => {
            html += renderTopicCard(topic, topics.indexOf(topic), i, query);
          });
          html += '</div>';
        }

        resultCountEl.innerHTML = t.search_results.replace('{}', totalVisible);
        resultCountEl.classList.add('visible');
      } else {
        resultCountEl.classList.remove('visible');

        if (activeCategory) {
          // Single category filtered mode
          totalVisible = filteredTopics.length;
          html += '<div class="topics-grid">';
          filteredTopics.forEach((topic, i) => {
            html += renderTopicCard(topic, topics.indexOf(topic), i);
          });
          html += '</div>';
        } else {
          // Grouped mode
          for (const cat of categories) {
            const catTopics = topics.filter(t => t.category === cat.id);
            if (catTopics.length === 0) continue;

            totalVisible += catTopics.length;

            html += `<div class="category-section fade-up" id="cat-${cat.id}">`;
            html += `<div class="category-header">`;
            html += `<span class="category-icon">${cat.icon}</span>`;
            html += `<span class="category-title">${cat[currentLang]}</span>`;
            html += `<span class="category-count">${catTopics.length}</span>`;
            html += `</div>`;
            html += `<div class="topics-grid">`;
            catTopics.forEach((topic, i) => {
              html += renderTopicCard(topic, topics.indexOf(topic), i);
            });
            html += `</div></div>`;
          }
        }
      }

      container.innerHTML = html;

      if (totalVisible === 0) {
        noResults.classList.add('visible');
      } else {
        noResults.classList.remove('visible');
      }

      // Trigger fade-up
      requestAnimationFrame(() => {
        container.querySelectorAll('.fade-up').forEach(el => el.classList.add('visible'));
      });
    }

    function renderTopicCard(topic, index, delay, query) {
      const data = topic[currentLang];
      const t = uiTranslations[currentLang];
      const stepCount = getStepCount(topic);
      const cat = categories.find(c => c.id === topic.category);
      const isSearching = !!query;

      const title = isSearching ? highlightText(data.title, query) : data.title;
      const subtitle = isSearching ? highlightText(data.subtitle, query) : data.subtitle;

      let meta = '';
      if (isSearching && cat) {
        meta += `<span class="topic-category-badge">${cat.icon} ${cat[currentLang]}</span>`;
      }
      if (stepCount > 0) {
        meta += `<span class="step-badge">${t.step_count.replace('{}', stepCount)}</span>`;
      }
      if (topic.isPremium) {
        meta += `<span class="premium-badge">${t.premium_label}</span>`;
      }

      return `
        <div class="topic-card fade-up delay-${Math.min(delay, 3)}" onclick="openDetail(${index})">
          <div class="topic-card-header">
            <div class="topic-icon-wrap">${topic.icon}</div>
            <div>
              <div class="topic-title">${title}</div>
              <div class="topic-subtitle">${subtitle}</div>
            </div>
          </div>
          ${meta ? `<div class="topic-meta">${meta}</div>` : ''}
          <svg class="topic-chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </div>
      `;
    }

    // ─── DETAIL ───
    function openDetail(index) {
      _previousFocus = document.activeElement;
      const topic = topics[index];
      const data = topic[currentLang];
      const t = uiTranslations[currentLang];
      const cat = categories.find(c => c.id === topic.category);

      let blocksHtml = '';
      for (const block of data.blocks) {
        switch (block.type) {
          case 'text':
            blocksHtml += `<p class="block-text">${block.text}</p>`;
            break;
          case 'tip':
            blocksHtml += `
              <div class="block-tip">
                <svg class="block-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span><span class="block-label">${t.tip_label}</span> ${block.text}</span>
              </div>`;
            break;
          case 'warning':
            blocksHtml += `
              <div class="block-warning">
                <svg class="block-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.832c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
                <span><span class="block-label">${t.warning_label}</span> ${block.text}</span>
              </div>`;
            break;
          case 'premium':
            blocksHtml += `
              <div class="block-premium">
                <svg class="block-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3l3.057 7.371L12 13l3.943-2.629L19 3M5 3l7 18 7-18"/></svg>
                <span><span class="block-label">${t.premium_note_label}</span> ${block.text}</span>
              </div>`;
            break;
          case 'steps':
            blocksHtml += `<div class="block-steps"><div class="steps-title">${block.title}</div><ol class="steps-list">`;
            block.steps.forEach((step, i) => {
              blocksHtml += `<li><span class="step-number">${i + 1}</span><span>${step}</span></li>`;
            });
            blocksHtml += `</ol></div>`;
            break;
        }
      }

      // Related topics
      let relatedHtml = '';
      if (topic.related && topic.related.length > 0) {
        relatedHtml = `<div class="related-section"><div class="related-title">${t.related_topics}</div><div class="related-chips">`;
        topic.related.forEach(ri => {
          if (ri >= 0 && ri < topics.length) {
            const rt = topics[ri][currentLang];
            relatedHtml += `<button class="related-chip" onclick="openDetail(${ri})">${topics[ri].icon} ${rt.title}</button>`;
          }
        });
        relatedHtml += `</div></div>`;
      }

      // Breadcrumb
      const breadcrumbHtml = `
        <div class="detail-breadcrumb">
          <span class="detail-breadcrumb-cat" onclick="closeDetail(); filterCategory('${topic.category}')">${cat ? cat.icon + ' ' + cat[currentLang] : ''}</span>
          <span class="detail-breadcrumb-sep">›</span>
          <span class="detail-breadcrumb-current">${data.title}</span>
        </div>`;

      // Prev/Next navigation
      const prevIdx = index > 0 ? index - 1 : null;
      const nextIdx = index < topics.length - 1 ? index + 1 : null;
      const prevLabel = prevIdx !== null ? topics[prevIdx][currentLang].title : '';
      const nextLabel = nextIdx !== null ? topics[nextIdx][currentLang].title : '';

      const navHtml = `
        <div class="detail-footer">
          <span class="detail-updated">${t.last_updated}</span>
          <div class="detail-nav">
            <button class="detail-nav-btn" ${prevIdx === null ? 'disabled' : `onclick="openDetail(${prevIdx})"`} title="${prevLabel}">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
              ${t.prev_topic}
            </button>
            <button class="detail-nav-btn" ${nextIdx === null ? 'disabled' : `onclick="openDetail(${nextIdx})"`} title="${nextLabel}">
              ${t.next_topic}
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            </button>
          </div>
        </div>`;

      document.getElementById('detailContent').innerHTML = `
        <div class="detail-header">
          <div class="detail-icon">${topic.icon}</div>
          <h2 class="detail-title" id="detailTitleId">${data.title}</h2>
        </div>
        ${breadcrumbHtml}
        <div class="detail-body">${blocksHtml}</div>
        ${relatedHtml}
        ${navHtml}
      `;

      const overlay = document.getElementById('detailOverlay');
      overlay.classList.add('active');
      overlay.scrollTop = 0;
      document.body.style.overflow = 'hidden';

      // Focus trap: focus close button on open
      requestAnimationFrame(() => {
        document.getElementById('detailClose').focus();
      });
    }

    let _previousFocus = null;

    function closeDetail() {
      document.getElementById('detailOverlay').classList.remove('active');
      document.body.style.overflow = '';
      if (_previousFocus) { _previousFocus.focus(); _previousFocus = null; }
    }

    // ─── LANGUAGE ───
    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('bbt-lang', lang);
      document.documentElement.lang = lang;

      const t = uiTranslations[lang];

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key]) el.textContent = t[key];
      });

      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        if (t[key]) el.placeholder = t[key];
      });

      const titles = {
        tr: 'Kullan\u0131m K\u0131lavuzu \u2014 BudgieBreedingTracker',
        en: 'User Guide \u2014 BudgieBreedingTracker',
        de: 'Benutzerhandbuch \u2014 BudgieBreedingTracker',
      };
      document.title = titles[lang];

      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.trim().toLowerCase() === lang);
      });

      renderStats();
      renderCategoryChips();
      renderGuide(document.getElementById('searchInput').value);
    }

    // ─── SEARCH ───
    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');

    searchInput.addEventListener('input', () => {
      const val = searchInput.value.trim();
      searchClear.classList.toggle('visible', val.length > 0);
      renderGuide(val);
    });

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchClear.classList.remove('visible');
      renderGuide('');
      searchInput.focus();
    });

    // ─── OVERLAY EVENTS ───
    document.getElementById('detailClose').addEventListener('click', closeDetail);
    document.getElementById('detailOverlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('detailOverlay')) closeDetail();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeDetail();

      // Focus trap within detail panel
      if (e.key === 'Tab' && document.getElementById('detailOverlay').classList.contains('active')) {
        const panel = document.getElementById('detailPanel');
        const focusable = panel.querySelectorAll('button, [href], [tabindex]:not([tabindex="-1"])');
        if (focusable.length === 0) return;
        const first = focusable[0];
        const last = focusable[focusable.length - 1];
        if (e.shiftKey) {
          if (document.activeElement === first) { e.preventDefault(); last.focus(); }
        } else {
          if (document.activeElement === last) { e.preventDefault(); first.focus(); }
        }
      }
    });

    // ─── SCROLL TO TOP ───
    const scrollTopBtn = document.getElementById('scrollTop');
    window.addEventListener('scroll', () => {
      scrollTopBtn.classList.toggle('visible', window.scrollY > 400);
    }, { passive: true });
    scrollTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // ─── INIT ───
    (function init() {
      const saved = localStorage.getItem('bbt-lang');
      if (saved && ['tr', 'en', 'de'].includes(saved)) {
        setLanguage(saved);
      } else {
        const browserLang = navigator.language?.slice(0, 2);
        if (['tr', 'en', 'de'].includes(browserLang)) {
          setLanguage(browserLang);
        } else {
          setLanguage('tr');
        }
      }

      // Fade-up observer
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });

      document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
    })();
  </script>

</body>
</html>
